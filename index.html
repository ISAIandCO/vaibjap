<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#101828" />
  <meta name="description" content="Nihongo Quest — PWA для изучения японского с пошаговым обучением." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <title>Nihongo Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0b1220; color: #e2e8f0; }
    .glass { background: rgba(15,23,42,.8); border: 1px solid rgba(148,163,184,.2); }
    .tile { cursor: grab; user-select: none; touch-action: manipulation; }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const kanaBank = [
      ['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],
      ['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],
      ['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],
      ['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],['や','ya'],['ゆ','yu'],['よ','yo'],['ら','ra'],['り','ri'],
      ['る','ru'],['れ','re'],['ろ','ro'],['わ','wa'],['を','wo'],['ん','n']
    ];

    const baseVocab = [
      { jp:'わたし', tr:'я' }, { jp:'あなた', tr:'ты/вы' }, { jp:'がくせい', tr:'студент' }, { jp:'せんせい', tr:'учитель' },
      { jp:'みず', tr:'вода' }, { jp:'ごはん', tr:'рис/еда' }, { jp:'ほん', tr:'книга' }, { jp:'ともだち', tr:'друг' },
      { jp:'きょう', tr:'сегодня' }, { jp:'あした', tr:'завтра' }, { jp:'いぬ', tr:'собака' }, { jp:'ねこ', tr:'кошка' },
      { jp:'えき', tr:'станция' }, { jp:'がっこう', tr:'школа' }, { jp:'しごと', tr:'работа' }, { jp:'にほん', tr:'Япония' }
    ];

    const phraseBank = [
      { jp:'おはようございます', tr:'доброе утро' },
      { jp:'こんにちは', tr:'добрый день' },
      { jp:'こんばんは', tr:'добрый вечер' },
      { jp:'ありがとうございます', tr:'спасибо' },
      { jp:'すみません', tr:'извините' },
      { jp:'はじめまして', tr:'приятно познакомиться' },
      { jp:'またあした', tr:'увидимся завтра' }
    ];

    const grammarBank = [
      { rule: 'は — частица темы.', sentence: 'わたしは がくせいです。', explain: 'Сначала тема, затем информация о теме.' },
      { rule: 'です — вежливая связка.', sentence: 'これは ほんです。', explain: 'Ставится в конце нейтрального утверждения.' },
      { rule: 'か — вопросительная частица.', sentence: 'これは みずですか。', explain: 'Добавляет вопрос в конце предложения.' },
      { rule: 'を — прямое дополнение.', sentence: 'ごはんを たべます。', explain: 'Показывает объект действия.' },
      { rule: 'に — направление/время.', sentence: 'えきに いきます。', explain: 'Отмечает направление или время.' },
      { rule: 'で — место действия.', sentence: 'がっこうで べんきょうします。', explain: 'Показывает место, где происходит действие.' }
    ];

    const distractRu = ['вчера','машина','снег','море','суп','лес','река'];

    const pick = (arr, i) => arr[i % arr.length];
    const mixed = (correct, wrong) => [correct, ...wrong].slice(0, 4).sort(() => Math.random() - 0.5);

    const teachWordTask = (w) => ({ type: 'teachWord', q: `Новое слово: ${w.jp} — ${w.tr}`, audio: w.jp, answer: w.jp, payload: w });
    const teachGrammarTask = (g) => ({ type: 'teachGrammar', q: `Грамматика: ${g.rule}`, audio: g.sentence, answer: g.rule, payload: g });
    const audioSpellTask = (word, tr, opts) => ({ type: 'audioSpell', q: `Прослушай и выбери написание слова («${tr}»)`, audio: word, options: mixed(word, opts), answer: word });

    function dragWordTask(word, tr, i) {
      const chars = word.split('');
      const extras = kanaBank.map((x) => x[0]).slice(i % 10, (i % 10) + 6);
      return {
        type: 'dragWord',
        q: `Собери слово (${tr})`,
        audio: word,
        answer: word,
        tiles: [...chars, ...extras].sort(() => Math.random() - 0.5)
      };
    }

    function pickWordWithKana(vocab, kanaList, idx) {
      return vocab.find((v) => kanaList.some((k) => v.jp.includes(k))) || pick(vocab, idx);
    }

    function makeMainLesson(day, vocab) {
      const k1 = pick(kanaBank, day - 1), k2 = pick(kanaBank, day + 3), k3 = pick(kanaBank, day + 8);
      const word1 = pickWordWithKana(vocab, [k1[0], k2[0], k3[0]], day);
      const word2 = pickWordWithKana(vocab, [k2[0], k3[0]], day + 4);
      const phrase = pick(phraseBank, day);
      const gram1 = pick(grammarBank, day);
      const gram2 = pick(grammarBank, day + 2);

      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: ${word1.jp}`,
        isReview: false,
        durationMin: 8,
        tasks: [
          { type: 'kana', q: `Новая буква: как читается ${k1[0]}?`, audio: k1[0], options: mixed(k1[1], ['to','na','mu']), answer: k1[1] },
          { type: 'kana', q: `Новая буква: как читается ${k2[0]}?`, audio: k2[0], options: mixed(k2[1], ['ra','yo','ne']), answer: k2[1] },
          teachWordTask(word1),
          { type: 'phrase', q: `Фраза дня: ${phrase.jp}`, audio: phrase.jp, options: mixed(phrase.tr, ['до встречи','приятного дня','доброй ночи']), answer: phrase.tr },
          { type: 'kanaPick', q: `Выбери символ для ${k3[1]}`, audio: k3[0], options: mixed(k3[0], ['め','ぬ','れ']), answer: k3[0] },
          audioSpellTask(word1.jp, word1.tr, [pick(vocab, day + 1).jp, pick(vocab, day + 2).jp, pick(vocab, day + 3).jp]),
          teachGrammarTask(gram1),
          { type: 'grammar', q: `Вопрос по грамматике`, audio: gram1.sentence, options: mixed(`${gram1.rule} ${gram1.explain}`, ['Глагол всегда в начале','Частицы не важны','です = прошедшее время']), answer: `${gram1.rule} ${gram1.explain}` },
          teachWordTask(word2),
          dragWordTask(word2.jp, word2.tr, day + 1),
          audioSpellTask(word2.jp, word2.tr, [pick(vocab, day + 5).jp, pick(vocab, day + 6).jp, pick(vocab, day + 7).jp]),
          { type: 'translate', q: `Теперь перевод: ${word1.jp}`, audio: word1.jp, options: mixed(word1.tr, distractRu.slice(day % 4, day % 4 + 3)), answer: word1.tr },
          teachGrammarTask(gram2),
          { type: 'grammar', q: `Ещё вопрос по грамматике`, audio: gram2.sentence, options: mixed(`${gram2.rule} ${gram2.explain}`, ['Не нужна вежливость','Частица стоит где угодно','Порядок слов всегда как в английском']), answer: `${gram2.rule} ${gram2.explain}` },
          { type: 'translate', q: `Теперь перевод: ${word2.jp}`, audio: word2.jp, options: mixed(word2.tr, distractRu.slice((day + 2) % 4, ((day + 2) % 4) + 3)), answer: word2.tr },
          { type: 'sentence', q: `Выбери правильное предложение (слова были изучены): わたし / がくせい`, audio: 'わたしは がくせいです', options: mixed('わたしは がくせいです', ['わたし がくせい は', 'です わたし がくせい', 'がくせい か わたし']), answer: 'わたしは がくせいです' },
          dragWordTask(word1.jp, word1.tr, day + 5)
        ]
      };
    }

    function makeReviewLesson(day, vocab) {
      const w1 = pick(vocab, day * 2), w2 = pick(vocab, day * 2 + 1), g = pick(grammarBank, day + 1);
      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: Повторение`,
        isReview: true,
        durationMin: 8,
        tasks: [
          teachWordTask(w1),
          audioSpellTask(w1.jp, w1.tr, [pick(vocab, day+1).jp, pick(vocab, day+2).jp, pick(vocab, day+3).jp]),
          { type: 'translate', q: `Повторение перевода: ${w1.jp}`, audio: w1.jp, options: mixed(w1.tr, ['город','море','ночь']), answer: w1.tr },
          teachGrammarTask(g),
          { type: 'grammar', q: 'Вопрос по грамматике', audio: g.sentence, options: mixed(`${g.rule} ${g.explain}`, ['Грамматика необязательна','Частицы не нужны','Сказуемое в начале']), answer: `${g.rule} ${g.explain}` },
          teachWordTask(w2),
          dragWordTask(w2.jp, w2.tr, day+9),
          { type: 'translate', q: `Повторение перевода: ${w2.jp}`, audio: w2.jp, options: mixed(w2.tr, ['река','гора','дверь']), answer: w2.tr }
        ]
      }
    }

    function makeLessons(vocab) {
      const list = [];
      for (let d = 1; d <= 42; d++) list.push(d % 7 === 0 ? makeReviewLesson(d, vocab) : makeMainLesson(d, vocab));
      return list;
    }

    function App() {
      const [vocab, setVocab] = useState(baseVocab);
      const [freqStatus, setFreqStatus] = useState('Загружен базовый словарь');
      const [progress, setProgress] = useState(() => JSON.parse(localStorage.getItem('nq_progress') || '{}'));
      const [stats, setStats] = useState(() => JSON.parse(localStorage.getItem('nq_stats') || '{"xp":0,"streak":0,"lastDate":""}'));
      const [activeId, setActiveId] = useState(null);
      const [attemptTasks, setAttemptTasks] = useState([]);
      const [index, setIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [choice, setChoice] = useState('');
      const [dropZone, setDropZone] = useState([]);
      const [poolTiles, setPoolTiles] = useState([]);
      const [result, setResult] = useState(null);
      const [speakHint, setSpeakHint] = useState('');
      const lastSpokenRef = useRef({ text: '', time: 0 });

      useEffect(() => {
        localStorage.setItem('nq_progress', JSON.stringify(progress));
        localStorage.setItem('nq_stats', JSON.stringify(stats));
      }, [progress, stats]);

      useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
      }, []);

      useEffect(() => {
        (async () => {
          try {
            setFreqStatus('Загрузка слов из основного wikiwords.lst...');
            const primaryUrl = 'https://raw.githubusercontent.com/ISAIandCO/vaibjap/refs/heads/main/wikiwords.lst';
            let text = '';
            try {
              const rPrimary = await fetch(primaryUrl);
              if (!rPrimary.ok) throw new Error('primary unavailable');
              text = await rPrimary.text();
            } catch {
              const rLocal = await fetch('./wikiwords.lst');
              if (!rLocal.ok) throw new Error('wikiwords.lst unavailable');
              text = await rLocal.text();
            }

            const fromList = [];
            const lines = text.split('\n');
            for (const raw of lines) {
              const line = raw.trim();
              if (!line || line.startsWith('#')) continue;
              const parts = line.split(/\t|\s+-\s+|\s+—\s+/).map((x) => x.trim()).filter(Boolean);
              if (!parts.length) continue;
              const jp = parts[0];
              const tr = parts.slice(1).join(' — ') || 'слово из списка';
              if (jp) fromList.push({ jp, tr });
            }

            const baseMap = Object.fromEntries(baseVocab.map((v) => [v.jp, v.tr]));
            const uniq = [];
            const seen = new Set();
            for (const item of [...fromList, ...baseVocab]) {
              const jp = item.jp;
              if (!jp || seen.has(jp)) continue;
              seen.add(jp);
              uniq.push({ jp, tr: baseMap[jp] || item.tr || 'слово из списка' });
            }
            if (!uniq.length) throw new Error('wikiwords list parse failed');
            setVocab(uniq);
            setFreqStatus(`Подключен список wikiwords: ${uniq.length} слов`);
          } catch {
            setFreqStatus('Не удалось загрузить wikiwords.lst, используется локальный словарь');
          }
        })();
      }, []);

      const lessons = useMemo(() => makeLessons(vocab), [vocab]);
      const completed = Object.keys(progress).map(Number);
      const unlockedUpTo = Math.min(42, (completed.length ? Math.max(...completed) : 0) + 1);
      const activeLesson = useMemo(() => lessons.find((l) => l.id === activeId), [lessons, activeId]);
      const currentTask = attemptTasks[index];

      useEffect(() => {
        if (!currentTask) return;
        setChoice('');
        setSpeakHint('');
        if (currentTask.type === 'dragWord') {
          setDropZone([]);
          setPoolTiles(currentTask.tiles);
        }
      }, [index, currentTask]);

      const speak = (text) => {
        if (!window.speechSynthesis || !text) return;
        const now = Date.now();
        const slow = lastSpokenRef.current.text === text && now - lastSpokenRef.current.time < 2500;
        lastSpokenRef.current = { text, time: now };
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        u.rate = slow ? 0.7 : 1;
        setSpeakHint(slow ? 'Замедленное воспроизведение' : 'Обычное воспроизведение');
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      };

      const startLesson = (lesson) => {
        if (lesson.id > unlockedUpTo) return;
        setActiveId(lesson.id);
        setAttemptTasks(lesson.tasks);
        setIndex(0);
        setAnswers([]);
        setResult(null);
      };

      const saveAnswerAndNext = () => {
        if (!currentTask) return;
        const isTeach = currentTask.type === 'teachWord' || currentTask.type === 'teachGrammar';
        const userAnswer = isTeach ? '__learned__' : (currentTask.type === 'dragWord' ? dropZone.join('') : choice);
        const next = [...answers, { task: currentTask, userAnswer }];
        setAnswers(next);

        if (index + 1 < attemptTasks.length) return setIndex((i) => i + 1);

        const wrong = next.filter((x) => !['teachWord','teachGrammar'].includes(x.task.type) && x.userAnswer !== x.task.answer);
        const total = next.filter((x) => !['teachWord','teachGrammar'].includes(x.task.type)).length;
        setResult({ score: total - wrong.length, total, wrong });
      };

      const finishLesson = () => {
        const today = new Date().toISOString().slice(0,10);
        const gain = 20 + Math.round((result.score / Math.max(1, result.total)) * 40);
        setProgress((p) => ({ ...p, [activeId]: true }));
        setStats((s) => ({ xp: s.xp + gain, streak: s.lastDate === today ? s.streak : s.streak + 1, lastDate: today }));
        setActiveId(null); setAttemptTasks([]); setResult(null);
      };

      const moveTileFromPool = (payload, withSound = true) => {
        const [tile, idxStr] = payload.split('::');
        const idx = Number(idxStr);
        if (!Number.isInteger(idx) || poolTiles[idx] !== tile) return;
        const np = [...poolTiles]; np.splice(idx, 1);
        setPoolTiles(np); setDropZone((d) => [...d, tile]);
        if (withSound) speak(tile);
      };

      const retakeWrong = () => {
        setAttemptTasks(result.wrong.map((x) => x.task));
        setIndex(0); setAnswers([]); setResult(null);
      };

      if (!activeId) {
        return <main className="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
          <header className="glass rounded-2xl p-5 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
            <div><h1 className="text-2xl font-bold">Nihongo Quest (PWA)</h1><p className="text-slate-300">{freqStatus}</p></div>
            <div className="grid grid-cols-3 gap-3 text-sm">
              <div className="glass rounded-xl px-3 py-2">XP<br/><b>{stats.xp}</b></div>
              <div className="glass rounded-xl px-3 py-2">Серия<br/><b>{stats.streak}</b></div>
              <div className="glass rounded-xl px-3 py-2">Открыто<br/><b>{unlockedUpTo}/42</b></div>
            </div>
          </header>
          <section className="space-y-3">
            {lessons.map((lesson) => {
              const locked = lesson.id > unlockedUpTo;
              return <button key={lesson.id} disabled={locked} onClick={() => startLesson(lesson)} className={`w-full text-left glass rounded-xl p-4 ${locked ? 'opacity-40 cursor-not-allowed' : 'hover:border-indigo-400'}`}>
                <div className="flex items-center justify-between gap-3">
                  <div>
                    <p className="text-xs text-indigo-300">Юнит {lesson.unit} {lesson.isReview ? '• Повторение' : ''}</p>
                    <h2 className="font-semibold">{lesson.title}</h2>
                    <p className="text-sm text-slate-300">⏱ {lesson.durationMin} мин • {lesson.tasks.length} заданий</p>
                  </div>
                  <div className="text-right text-sm">{progress[lesson.id] ? '✅ Завершен' : locked ? '🔒 Закрыт' : '🟢 Доступен'}</div>
                </div>
              </button>
            })}
          </section>
        </main>
      }

      if (result) {
        return <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4"><section className="glass rounded-2xl p-5 space-y-4">
          <h2 className="text-2xl font-bold">Результат урока</h2>
          <p>Верно: <b>{result.score}/{result.total}</b></p>
          {result.wrong.length > 0 && <div className="space-y-2">
            <p className="text-amber-300">Ошибки:</p>
            {result.wrong.map((w, i) => <div key={i} className="bg-slate-900 rounded p-3 text-sm"><p>{w.task.q}</p><p className="text-slate-400">Ваш ответ: {w.userAnswer || '—'}</p><p className="text-emerald-300">Правильный: {w.task.answer}</p></div>)}
            <button onClick={retakeWrong} className="bg-amber-600 rounded px-4 py-2">Пересдать ошибки</button>
          </div>}
          <button onClick={finishLesson} className="bg-indigo-600 rounded px-4 py-2">Завершить урок</button>
        </section></main>
      }

      const isTeach = ['teachWord','teachGrammar'].includes(currentTask.type);
      return <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4"><section className="glass rounded-2xl p-5 space-y-4">
        <div className="flex justify-between text-sm text-slate-300"><span>{activeLesson.title}</span><span>Задание {index+1}/{attemptTasks.length}</span></div>
        <h2 className="text-xl font-semibold">{currentTask.q}</h2>
        <button onClick={() => speak(currentTask.audio || currentTask.answer)} className="bg-indigo-600 rounded px-3 py-2">🔊 Прослушать</button>
        {speakHint && <p className="text-xs text-indigo-300">{speakHint}</p>}

        {isTeach ? <div className="space-y-2 bg-slate-900 rounded p-3 text-slate-300">
          {currentTask.type === 'teachGrammar' && <><p><b>Правило:</b> {currentTask.payload.rule}</p><p><b>Пример:</b> {currentTask.payload.sentence}</p><p><b>Объяснение:</b> {currentTask.payload.explain}</p></>}
          {currentTask.type === 'teachWord' && <p>Запомни слово и перевод, затем будут задания на написание и перевод.</p>}
        </div> : currentTask.type === 'dragWord' ? <div className="space-y-3">
          <div onDragOver={(e)=>e.preventDefault()} onDrop={(e)=>{e.preventDefault(); moveTileFromPool(e.dataTransfer.getData('text/plain'));}} className="min-h-16 rounded border border-dashed border-emerald-400 p-2 flex flex-wrap gap-2 bg-emerald-900/10">
            {dropZone.length === 0 ? <span className="text-slate-400">Перетащи буквы сюда или нажми на букву ниже</span> : null}
            {dropZone.map((t, idx) => <button key={`${t}-${idx}`} onClick={() => { const n=[...dropZone]; const [tile]=n.splice(idx,1); setDropZone(n); setPoolTiles((p)=>[...p,tile]); speak(tile); }} className="bg-emerald-800/60 rounded px-3 py-1">{t}</button>)}
          </div>
          <div className="flex flex-wrap gap-2">
            {poolTiles.map((t, idx) => <button key={`${t}-${idx}`} draggable onDragStart={(e)=>{e.dataTransfer.setData('text/plain', `${t}::${idx}`); speak(t);}} onClick={()=>moveTileFromPool(`${t}::${idx}`)} className="tile bg-slate-700 rounded px-3 py-1">{t}</button>)}
          </div>
        </div> : <div className="grid gap-2">{currentTask.options.map((o)=><button key={o} onClick={()=>setChoice(o)} className={`text-left px-3 py-2 rounded border ${choice===o?'border-emerald-400 bg-emerald-900/20':'border-slate-600 bg-slate-900'}`}>{o}</button>)}</div>}

        <button onClick={saveAnswerAndNext} className="bg-emerald-600 rounded px-4 py-2">Дальше</button>
      </section></main>
    }

    window.addEventListener('error', () => {
      const root = document.getElementById('root');
      if (root && !root.innerHTML) root.innerHTML = '<div style="padding:16px;color:#fff">Ошибка загрузки приложения. Обновите страницу.</div>';
    });

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
