<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#101828" />
  <meta name="description" content="Nihongo Quest — PWA-платформа для изучения японского языка с частотной лексикой." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <title>Nihongo Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>body{background:#0b1220;color:#e2e8f0}.glass{background:rgba(15,23,42,.8);border:1px solid rgba(148,163,184,.2)}.tile{cursor:grab;user-select:none;touch-action:manipulation}</style>
</head>
<body class="min-h-screen"><div id="root"></div>
<script type="text/babel">
const { useEffect, useMemo, useState, useRef } = React;
const kanaBank=[['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],['や','ya'],['ゆ','yu'],['よ','yo'],['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro'],['わ','wa'],['を','wo'],['ん','n']];
const baseVocab=[{jp:'わたし',tr:'я'},{jp:'あなた',tr:'ты/вы'},{jp:'がくせい',tr:'студент'},{jp:'せんせい',tr:'учитель'},{jp:'みず',tr:'вода'},{jp:'ごはん',tr:'рис/еда'},{jp:'ほん',tr:'книга'},{jp:'ともだち',tr:'друг'},{jp:'きょう',tr:'сегодня'},{jp:'あした',tr:'завтра'},{jp:'いぬ',tr:'собака'},{jp:'ねこ',tr:'кошка'},{jp:'えき',tr:'станция'},{jp:'がっこう',tr:'школа'},{jp:'しごと',tr:'работа'},{jp:'にほん',tr:'Япония'}];
const phraseBank=[{jp:'おはようございます',tr:'доброе утро'},{jp:'こんにちは',tr:'добрый день'},{jp:'こんばんは',tr:'добрый вечер'},{jp:'ありがとうございます',tr:'спасибо'},{jp:'すみません',tr:'извините'},{jp:'はじめまして',tr:'приятно познакомиться'},{jp:'またあした',tr:'увидимся завтра'}];
const grammarBits=['は — частица темы. Ставится после темы: わたしは がくせいです。','です — вежливая связка в конце нейтрального утверждения.','か — вопросительная частица. Делает фразу вопросом.','を — маркер прямого дополнения (что делаем?).','に — направление/время: куда? когда?','で — место действия: где происходит действие?'];
const distractorsRu=['вчера','машина','снег','море','суп','лес','река','гора'];
const kanaDistractors=['め','ぬ','を','れ','や','よ','む','の'];
const pick=(arr,i)=>arr[i%arr.length];
const mixedOptions=(c,f)=>[c,...f].slice(0,4).sort(()=>Math.random()-.5);
const makeTeachWordTask=(w)=>({type:'teach',q:`Запомни слово: ${w.jp} — ${w.tr}`,audio:w.jp,answer:w.jp});
const makeTeachGrammarTask=(r)=>({type:'teach',q:`Объяснение грамматики: ${r}`,audio:r,answer:r});
const makeWordBuildTask=(word,tr,i)=>{const chars=word.split('');const extras=kanaBank.map(x=>x[0]).slice(i%10,(i%10)+8);return{type:'dragWord',q:`Собери слово (${tr})`,answer:word,audio:word,tiles:[...chars,...extras.slice(0,Math.max(3,Math.ceil(chars.length/2)))].sort(()=>Math.random()-.5)}};
const makeAudioSpellingTask=(word,tr,a,b,c)=>({type:'audioSpell',q:`Прослушай и выбери написание слова («${tr}»)`,audio:word,options:mixedOptions(word,[a,b,c]),answer:word});
const pickWordWithKana=(kanaChars,vocab,idx)=>vocab.find(v=>kanaChars.some(k=>v.jp.includes(k)))||pick(vocab,idx);
function makeMainLesson(day,vocab){const k1=pick(kanaBank,day-1),k2=pick(kanaBank,day+3),k3=pick(kanaBank,day+8);const w1=pickWordWithKana([k1[0],k2[0],k3[0]],vocab,day);const w2=pickWordWithKana([k2[0],k3[0]],vocab,day+4);const p1=pick(phraseBank,day),p2=pick(phraseBank,day+2),g=pick(grammarBits,day);const d1=[pick(vocab,day+1).jp,pick(vocab,day+2).jp,pick(vocab,day+3).jp];const d2=[pick(vocab,day+5).jp,pick(vocab,day+6).jp,pick(vocab,day+7).jp];return{id:day,unit:Math.ceil(day/7),title:`День ${day}: ${w1.jp}`,isReview:false,durationMin:8,tasks:[{type:'kana',q:`Новая буква: как читается ${k1[0]}?`,audio:k1[0],options:mixedOptions(k1[1],['to','na','mu']),answer:k1[1]},{type:'kana',q:`Новая буква: как читается ${k2[0]}?`,audio:k2[0],options:mixedOptions(k2[1],['ra','yo','ne']),answer:k2[1]},makeTeachWordTask(w1),{type:'phrase',q:`Фраза дня: ${p1.jp}`,audio:p1.jp,options:mixedOptions(p1.tr,['до встречи','я устал','приятного дня']),answer:p1.tr},{type:'kanaPick',q:`Выбери символ для ${k3[1]}`,audio:k3[0],options:mixedOptions(k3[0],kanaDistractors.slice(day%4,day%4+3)),answer:k3[0]},makeAudioSpellingTask(w1.jp,w1.tr,d1[0],d1[1],d1[2]),makeTeachGrammarTask(g),{type:'grammar',q:'Теперь вопрос по правилу',audio:g,options:mixedOptions(g,['Глагол всегда в начале','Частиц в японском нет','です = прошедшее время']),answer:g},makeTeachWordTask(w2),makeWordBuildTask(w2.jp,w2.tr,day+1),makeAudioSpellingTask(w2.jp,w2.tr,d2[0],d2[1],d2[2]),{type:'translate',q:`Теперь перевод: ${w1.jp}`,audio:w1.jp,options:mixedOptions(w1.tr,distractorsRu.slice(day%5,day%5+3)),answer:w1.tr},{type:'translate',q:`Теперь перевод: ${w2.jp}`,audio:w2.jp,options:mixedOptions(w2.tr,distractorsRu.slice((day+2)%5,(day+2)%5+3)),answer:w2.tr},{type:'sentence',q:'Выбери правильное предложение (слова уже были в уроке): わたし / がくせい',audio:'わたしは がくせいです',options:mixedOptions('わたしは がくせいです',['わたし がくせい は','です わたし がくせい','がくせい か わたし']),answer:'わたしは がくせいです'},{type:'phrase',q:`Фраза дня: ${p2.jp}`,audio:p2.jp,options:mixedOptions(p2.tr,['не понимаю','до завтра','доброй ночи']),answer:p2.tr},makeWordBuildTask(w1.jp,w1.tr,day+5)]};}
function makeReviewLesson(day,vocab){const v1=pick(vocab,day*2),v2=pick(vocab,day*2+1),k1=pick(kanaBank,day+1),g=pick(grammarBits,day+2),p1=pick(phraseBank,day+1);return{id:day,unit:Math.ceil(day/7),title:`День ${day}: Повторение`,isReview:true,durationMin:8,tasks:[{type:'kana',q:`Повторение: ${k1[0]}?`,audio:k1[0],options:mixedOptions(k1[1],['re','yo','wa']),answer:k1[1]},makeTeachWordTask(v1),makeAudioSpellingTask(v1.jp,v1.tr,pick(vocab,day+1).jp,pick(vocab,day+2).jp,pick(vocab,day+3).jp),{type:'translate',q:`Повторение перевода: ${v1.jp}`,audio:v1.jp,options:mixedOptions(v1.tr,['город','море','ночь']),answer:v1.tr},makeTeachGrammarTask(g),{type:'grammar',q:'Вопрос по грамматике',audio:g,options:mixedOptions(g,['Частицы не нужны','Глагол всегда первый','Вежливости не существует']),answer:g},makeTeachWordTask(v2),makeWordBuildTask(v2.jp,v2.tr,day+9),makeAudioSpellingTask(v2.jp,v2.tr,pick(vocab,day+4).jp,pick(vocab,day+5).jp,pick(vocab,day+6).jp),{type:'translate',q:`Повторение перевода: ${v2.jp}`,audio:v2.jp,options:mixedOptions(v2.tr,['река','гора','дверь']),answer:v2.tr},{type:'phrase',q:`Повторение фразы: ${p1.jp}`,audio:p1.jp,options:mixedOptions(p1.tr,['до завтра','я студент','приятного аппетита']),answer:p1.tr}]};}
const makeLessons=(vocab)=>{const a=[];for(let d=1;d<=42;d++)a.push(d%7===0?makeReviewLesson(d,vocab):makeMainLesson(d,vocab));return a;};
function App(){
 const [vocab,setVocab]=useState(baseVocab); const [freqStatus,setFreqStatus]=useState('Загружен базовый словарь');
 const [progress,setProgress]=useState(()=>JSON.parse(localStorage.getItem('nq_progress')||'{}')); const [stats,setStats]=useState(()=>JSON.parse(localStorage.getItem('nq_stats')||'{"xp":0,"streak":0,"lastDate":""}'));
 const [activeId,setActiveId]=useState(null),[attemptTasks,setAttemptTasks]=useState([]),[index,setIndex]=useState(0),[answers,setAnswers]=useState([]),[choice,setChoice]=useState(''),[dropZone,setDropZone]=useState([]),[poolTiles,setPoolTiles]=useState([]),[result,setResult]=useState(null),[speakHint,setSpeakHint]=useState('');
 const lastSpokenRef=useRef({text:'',time:0});
 useEffect(()=>{localStorage.setItem('nq_progress',JSON.stringify(progress));localStorage.setItem('nq_stats',JSON.stringify(stats));},[progress,stats]);
 useEffect(()=>{if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});},[]);
 useEffect(()=>{(async()=>{try{setFreqStatus('Загрузка top-10000 частотных слов...');const r=await fetch('https://raw.githubusercontent.com/hermitdave/FrequencyWords/master/content/2018/ja/ja_50k.txt');if(!r.ok) throw new Error('freq list unavailable');const txt=await r.text();const words=txt.split('\n').map(l=>l.trim().split(' ')[0]).filter(Boolean).slice(0,10000);const map=Object.fromEntries(baseVocab.map(v=>[v.jp,v.tr]));const merged=[];const seen=new Set();for(const w of [...words,...baseVocab.map(v=>v.jp)]){if(seen.has(w))continue;seen.add(w);merged.push({jp:w,tr:map[w]||'частотное слово'});}setVocab(merged);setFreqStatus(`Подключен частотный список: ${Math.min(words.length,10000)} слов`);}catch(e){setFreqStatus('Не удалось загрузить внешний список, используется локальный словарь');}})();},[]);
 const lessons=useMemo(()=>makeLessons(vocab),[vocab]);
 const completedIds=Object.keys(progress).map(Number), maxCompleted=completedIds.length?Math.max(...completedIds):0, unlockedUpTo=Math.min(42,maxCompleted+1);
 const activeLesson=useMemo(()=>lessons.find(l=>l.id===activeId),[activeId,lessons]); const currentTask=attemptTasks[index];
 useEffect(()=>{if(!currentTask)return; setChoice(''); setSpeakHint(''); if(currentTask.type==='dragWord'){setDropZone([]); setPoolTiles(currentTask.tiles);}},[index,currentTask]);
 const speak=(text)=>{if(!window.speechSynthesis||!text)return; const now=Date.now(); const slow=lastSpokenRef.current.text===text && (now-lastSpokenRef.current.time<2500); lastSpokenRef.current={text,time:now}; const u=new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=slow?0.7:1; setSpeakHint(slow?'Замедленное воспроизведение':'Обычное воспроизведение'); window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);};
 const startLesson=(lesson)=>{if(lesson.id>unlockedUpTo)return; setActiveId(lesson.id); setAttemptTasks(lesson.tasks); setIndex(0); setAnswers([]); setResult(null);};
 const saveAnswerAndNext=()=>{if(!currentTask)return; const isTeach=currentTask.type==='teach'; const userAnswer=isTeach?'__learned__':(currentTask.type==='dragWord'?dropZone.join(''):choice); const next=[...answers,{task:currentTask,userAnswer}]; setAnswers(next); if(index+1<attemptTasks.length){setIndex(i=>i+1);return;} const wrong=next.filter(x=>x.task.type!=='teach' && x.userAnswer!==x.task.answer); const total=next.filter(x=>x.task.type!=='teach').length; setResult({score:total-wrong.length,total,wrong,all:next});};
 const finishLesson=()=>{const today=new Date().toISOString().slice(0,10); const gain=20+Math.round((result.score/Math.max(1,result.total))*40); setProgress(p=>({...p,[activeId]:true})); setStats(s=>({xp:s.xp+gain,streak:s.lastDate===today?s.streak:s.streak+1,lastDate:today})); setActiveId(null); setAttemptTasks([]); setResult(null);};
 const retakeWrong=()=>{setAttemptTasks(result.wrong.map(x=>x.task)); setIndex(0); setAnswers([]); setResult(null);};
 const moveTileFromPool=(payload)=>{const [tile,idxStr]=payload.split('::'); const idx=Number(idxStr); if(!Number.isInteger(idx)||poolTiles[idx]!==tile)return; const np=[...poolTiles]; np.splice(idx,1); setPoolTiles(np); setDropZone(d=>[...d,tile]);};
 if(!activeId) return <main className="max-w-5xl mx-auto p-4 md:p-8 space-y-6"><header className="glass rounded-2xl p-5 flex flex-col md:flex-row gap-4 md:items-center md:justify-between"><div><h1 className="text-2xl font-bold">Nihongo Quest (PWA)</h1><p className="text-slate-300">{freqStatus}</p></div><div className="grid grid-cols-3 gap-3 text-sm"><div className="glass rounded-xl px-3 py-2">XP<br/><b>{stats.xp}</b></div><div className="glass rounded-xl px-3 py-2">Серия<br/><b>{stats.streak}</b></div><div className="glass rounded-xl px-3 py-2">Открыто<br/><b>{unlockedUpTo}/42</b></div></div></header><section className="space-y-3">{lessons.map(lesson=>{const locked=lesson.id>unlockedUpTo; return <button key={lesson.id} disabled={locked} onClick={()=>startLesson(lesson)} className={`w-full text-left glass rounded-xl p-4 transition ${locked?'opacity-40 cursor-not-allowed':'hover:border-indigo-400'}`}><div className="flex items-center justify-between gap-3"><div><p className="text-xs text-indigo-300">Юнит {lesson.unit} {lesson.isReview?'• Повторение':''}</p><h2 className="font-semibold">{lesson.title}</h2><p className="text-sm text-slate-300">⏱ {lesson.durationMin} мин • {lesson.tasks.length} заданий</p></div><div className="text-right text-sm"><p>{progress[lesson.id]?'✅ Завершен':locked?'🔒 Закрыт':'🟢 Доступен'}</p></div></div></button>})}</section></main>;
 if(result) return <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4"><section className="glass rounded-2xl p-5 space-y-4"><h2 className="text-2xl font-bold">Результат урока</h2><p>Верно: <b>{result.score}/{result.total}</b></p>{result.wrong.length>0?<div className="space-y-2"><p className="text-amber-300">Ошибки (исправление только после урока):</p>{result.wrong.map((w,i)=><div key={i} className="bg-slate-900 rounded p-3 text-sm"><p>{w.task.q}</p><p className="text-slate-400">Ваш ответ: {w.userAnswer||'—'}</p><p className="text-emerald-300">Правильный: {w.task.answer}</p></div>)}<button onClick={retakeWrong} className="bg-amber-600 hover:bg-amber-500 rounded px-4 py-2">Пересдать ошибки</button></div>:<p className="text-emerald-300">Идеально! Можно перейти к следующему уроку.</p>}<button onClick={finishLesson} className="bg-indigo-600 hover:bg-indigo-500 rounded px-4 py-2">Завершить урок</button></section></main>;
 const isTeach=currentTask.type==='teach';
 return <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4"><section className="glass rounded-2xl p-5 space-y-4"><div className="flex justify-between text-sm text-slate-300"><span>{activeLesson.title}</span><span>Задание {index+1}/{attemptTasks.length}</span></div><h2 className="text-xl font-semibold">{currentTask.q}</h2><button onClick={()=>speak(currentTask.audio||currentTask.answer)} className="bg-indigo-600 hover:bg-indigo-500 rounded px-3 py-2">🔊 Прослушать</button>{speakHint&&<p className="text-xs text-indigo-300">{speakHint}</p>}{isTeach?<p className="text-slate-300 bg-slate-900 rounded p-3">Это обучающий шаг. Запомни материал и переходи дальше.</p>:currentTask.type==='dragWord'?<div className="space-y-3"><div onDragOver={(e)=>e.preventDefault()} onDrop={(e)=>{e.preventDefault(); moveTileFromPool(e.dataTransfer.getData('text/plain'));}} className="min-h-16 rounded border border-dashed border-emerald-400 p-2 flex flex-wrap gap-2 bg-emerald-900/10">{dropZone.length===0?<span className="text-slate-400">Перетащи буквы сюда или нажми на букву ниже</span>:null}{dropZone.map((t,idx)=><button key={`${t}-${idx}`} onClick={()=>{const n=[...dropZone];const [tile]=n.splice(idx,1);setDropZone(n);setPoolTiles(p=>[...p,tile]);}} className="bg-emerald-800/60 rounded px-3 py-1">{t}</button>)}</div><div className="flex flex-wrap gap-2">{poolTiles.map((t,idx)=><button key={`${t}-${idx}`} draggable onDragStart={(e)=>e.dataTransfer.setData('text/plain',`${t}::${idx}`)} onClick={()=>moveTileFromPool(`${t}::${idx}`)} className="tile bg-slate-700 rounded px-3 py-1">{t}</button>)}</div></div>:<div className="grid gap-2">{currentTask.options.map(o=><button key={o} onClick={()=>setChoice(o)} className={`text-left px-3 py-2 rounded border ${choice===o?'border-emerald-400 bg-emerald-900/20':'border-slate-600 bg-slate-900'}`}>{o}</button>)}</div>}<button onClick={saveAnswerAndNext} className="bg-emerald-600 hover:bg-emerald-500 rounded px-4 py-2">Дальше</button></section></main>
}
window.addEventListener('error',()=>{const r=document.getElementById('root');if(r&&!r.innerHTML)r.innerHTML='<div style="padding:16px;color:#fff">Ошибка загрузки приложения. Обновите страницу.</div>'});
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
