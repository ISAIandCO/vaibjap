<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#101828" />
  <meta name="description" content="Nihongo Quest — PWA-платформа для изучения японского языка с постепенным прогрессом и повторением." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <title>Nihongo Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background:#0b1220; color:#e2e8f0; }
    .glass { background: rgba(15,23,42,.8); border:1px solid rgba(148,163,184,.2); }
    .tile { cursor: grab; }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const kanaBank = [
      ['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],
      ['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],
      ['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']
    ];

    const vocabBank = [
      { jp:'わたし', tr:'я' }, { jp:'あなた', tr:'ты/вы' }, { jp:'がくせい', tr:'студент' }, { jp:'せんせい', tr:'учитель' },
      { jp:'みず', tr:'вода' }, { jp:'ごはん', tr:'рис/еда' }, { jp:'ほん', tr:'книга' }, { jp:'ともだち', tr:'друг' },
      { jp:'きょう', tr:'сегодня' }, { jp:'あした', tr:'завтра' }, { jp:'いぬ', tr:'собака' }, { jp:'ねこ', tr:'кошка' },
      { jp:'えき', tr:'станция' }, { jp:'がっこう', tr:'школа' }, { jp:'しごと', tr:'работа' }
    ];

    const grammarBits = [
      'は — частица темы: わたしは がくせいです。',
      'です — вежливая связка в конце фразы.',
      'か — вопросительная частица: ...ですか？',
      'を — маркер прямого дополнения.',
      'に — направление/время: えきに いきます。',
      'で — место действия: がっこうで べんきょうします。'
    ];

    const mixedOptions = (correct, filler) => [correct, ...filler].sort(() => Math.random() - 0.5);

    const makeWordBuildTask = (word, translation) => {
      const chars = word.split('');
      const fillers = ['ら','り','る','ろ','ま','み','む','め'];
      const extra = fillers.slice(0, Math.max(2, Math.ceil(chars.length / 2)));
      const tiles = [...chars, ...extra].sort(() => Math.random() - 0.5);
      return {
        type: 'dragWord',
        q: `Собери слово (${translation}) перетаскиванием букв`,
        answer: word,
        audio: word,
        tiles
      };
    };

    const makeMainLesson = (day) => {
      const kana = kanaBank[(day - 1) % kanaBank.length];
      const vocab = vocabBank[(day - 1) % vocabBank.length];
      const grammar = grammarBits[(day - 1) % grammarBits.length];
      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: ${vocab.jp} + ${kana[0]}`,
        isReview: false,
        durationMin: 6,
        tasks: [
          { type: 'kana', q: `Как читается ${kana[0]}?`, audio: kana[0], options: mixedOptions(kana[1], ['to', 'na', 'mu']), answer: kana[1] },
          { type: 'kanaPick', q: `Выбери символ для ${kana[1]}`, audio: kana[0], options: mixedOptions(kana[0], ['め', 'ぬ', 'を']), answer: kana[0] },
          { type: 'translate', q: `Переведи: ${vocab.jp}`, audio: vocab.jp, options: mixedOptions(vocab.tr, ['вчера', 'машина', 'снег']), answer: vocab.tr },
          { type: 'grammar', q: 'Выбери верное правило', options: mixedOptions(grammar, ['Глагол всегда в начале', 'Частиц в японском нет', 'です = прошедшее время']), answer: grammar },
          makeWordBuildTask(vocab.jp, vocab.tr),
          { type: 'translate', q: 'Переведи: みず', audio: 'みず', options: mixedOptions('вода', ['рис', 'хлеб', 'чай']), answer: 'вода' },
          { type: 'boss', q: 'Босс-раунд: Я завтра иду в школу', audio: 'わたしは あした がっこうに いきます', options: mixedOptions('わたしは あした がっこうに いきます', ['あしたは わたし いきます に がっこう', 'がっこうを あした です', 'わたし がっこう か']), answer: 'わたしは あした がっこうに いきます' }
        ]
      };
    };

    const makeReviewLesson = (day) => {
      const upto = day - 1;
      const vocab = vocabBank[upto % vocabBank.length];
      const kana = kanaBank[upto % kanaBank.length];
      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: Повторение юнита`,
        isReview: true,
        durationMin: 7,
        tasks: [
          { type: 'translate', q: `Повторение: ${vocab.jp}`, audio: vocab.jp, options: mixedOptions(vocab.tr, ['город', 'море', 'ночь']), answer: vocab.tr },
          { type: 'kana', q: `Повторение: как читается ${kana[0]}?`, audio: kana[0], options: mixedOptions(kana[1], ['re', 'yo', 'wa']), answer: kana[1] },
          makeWordBuildTask(vocab.jp, vocab.tr),
          { type: 'boss', q: 'Контроль: выбери корректное предложение', options: mixedOptions('わたしは がくせいです', ['わたし がくせい は', 'です わたし がくせい', 'わたし か がくせい']), answer: 'わたしは がくせいです' }
        ]
      };
    };

    const makeLessons = () => {
      const lessons = [];
      for (let day = 1; day <= 42; day++) {
        lessons.push(day % 7 === 0 ? makeReviewLesson(day) : makeMainLesson(day));
      }
      return lessons;
    };

    const lessons = makeLessons();

    function App() {
      const [progress, setProgress] = useState(() => JSON.parse(localStorage.getItem('nq_progress') || '{}'));
      const [stats, setStats] = useState(() => JSON.parse(localStorage.getItem('nq_stats') || '{"xp":0,"streak":0,"lastDate":""}'));
      const [activeId, setActiveId] = useState(null);
      const [attemptTasks, setAttemptTasks] = useState([]);
      const [index, setIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [choice, setChoice] = useState('');
      const [dropZone, setDropZone] = useState([]);
      const [poolTiles, setPoolTiles] = useState([]);
      const [result, setResult] = useState(null);

      useEffect(() => {
        localStorage.setItem('nq_progress', JSON.stringify(progress));
        localStorage.setItem('nq_stats', JSON.stringify(stats));
      }, [progress, stats]);

      useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
      }, []);

      const completedIds = Object.keys(progress).map(Number);
      const maxCompleted = completedIds.length ? Math.max(...completedIds) : 0;
      const unlockedUpTo = Math.min(42, maxCompleted + 1);
      const activeLesson = useMemo(() => lessons.find((l) => l.id === activeId), [activeId]);
      const currentTask = attemptTasks[index];

      useEffect(() => {
        if (!currentTask) return;
        setChoice('');
        if (currentTask.type === 'dragWord') {
          setDropZone([]);
          setPoolTiles(currentTask.tiles);
        }
      }, [index, currentTask]);

      const speak = (text) => {
        if (!window.speechSynthesis || !text) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      };

      const startLesson = (lesson) => {
        if (lesson.id > unlockedUpTo) return;
        setActiveId(lesson.id);
        setAttemptTasks(lesson.tasks);
        setIndex(0);
        setAnswers([]);
        setResult(null);
      };

      const saveAnswerAndNext = () => {
        if (!currentTask) return;
        const userAnswer = currentTask.type === 'dragWord' ? dropZone.join('') : choice;
        setAnswers((prev) => [...prev, { task: currentTask, userAnswer }]);

        if (index + 1 < attemptTasks.length) {
          setIndex((i) => i + 1);
          return;
        }

        const finalAnswers = [...answers, { task: currentTask, userAnswer }];
        const wrong = finalAnswers.filter((x) => x.userAnswer !== x.task.answer);
        const score = finalAnswers.length - wrong.length;
        setResult({ score, total: finalAnswers.length, wrong, all: finalAnswers });
      };

      const finishLesson = () => {
        const today = new Date().toISOString().slice(0, 10);
        const gain = 20 + Math.round((result.score / result.total) * 40);
        setProgress((p) => ({ ...p, [activeId]: true }));
        setStats((s) => ({
          xp: s.xp + gain,
          streak: s.lastDate === today ? s.streak : s.streak + 1,
          lastDate: today
        }));
        setActiveId(null);
        setAttemptTasks([]);
        setResult(null);
      };

      const retakeWrong = () => {
        const wrongTasks = result.wrong.map((x) => x.task);
        setAttemptTasks(wrongTasks);
        setIndex(0);
        setAnswers([]);
        setResult(null);
      };

      const onDragStart = (e, tile) => e.dataTransfer.setData('text/plain', tile);
      const moveToDrop = (e) => {
        e.preventDefault();
        const tile = e.dataTransfer.getData('text/plain');
        const idx = poolTiles.indexOf(tile);
        if (idx === -1) return;
        const nextPool = [...poolTiles];
        nextPool.splice(idx, 1);
        setPoolTiles(nextPool);
        setDropZone((d) => [...d, tile]);
      };
      const moveBack = (idx) => {
        const next = [...dropZone];
        const [tile] = next.splice(idx, 1);
        setDropZone(next);
        setPoolTiles((p) => [...p, tile]);
      };

      if (!activeId) {
        return (
          <main className="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
            <header className="glass rounded-2xl p-5 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
              <div>
                <h1 className="text-2xl font-bold">Nihongo Quest (PWA)</h1>
                <p className="text-slate-300">42 урока, открываются по очереди. Каждая сессия 5+ минут и включает тренировку произношения и повторение.</p>
              </div>
              <div className="grid grid-cols-3 gap-3 text-sm">
                <div className="glass rounded-xl px-3 py-2">XP<br/><b>{stats.xp}</b></div>
                <div className="glass rounded-xl px-3 py-2">Серия<br/><b>{stats.streak}</b></div>
                <div className="glass rounded-xl px-3 py-2">Открыто<br/><b>{unlockedUpTo}/42</b></div>
              </div>
            </header>

            <section className="space-y-3">
              {lessons.map((lesson) => {
                const locked = lesson.id > unlockedUpTo;
                return (
                  <button
                    key={lesson.id}
                    disabled={locked}
                    onClick={() => startLesson(lesson)}
                    className={`w-full text-left glass rounded-xl p-4 transition ${locked ? 'opacity-40 cursor-not-allowed' : 'hover:border-indigo-400'}`}
                  >
                    <div className="flex items-center justify-between gap-3">
                      <div>
                        <p className="text-xs text-indigo-300">Юнит {lesson.unit} {lesson.isReview ? '• Повторение' : ''}</p>
                        <h2 className="font-semibold">{lesson.title}</h2>
                        <p className="text-sm text-slate-300">⏱ {lesson.durationMin} мин • {lesson.tasks.length} заданий</p>
                      </div>
                      <div className="text-right text-sm">
                        <p>{progress[lesson.id] ? '✅ Завершен' : locked ? '🔒 Закрыт' : '🟢 Доступен'}</p>
                      </div>
                    </div>
                  </button>
                );
              })}
            </section>
          </main>
        );
      }

      if (result) {
        return (
          <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4">
            <section className="glass rounded-2xl p-5 space-y-4">
              <h2 className="text-2xl font-bold">Результат урока</h2>
              <p>Верно: <b>{result.score}/{result.total}</b></p>
              {result.wrong.length > 0 ? (
                <div className="space-y-2">
                  <p className="text-amber-300">Ошибки (исправление только после урока):</p>
                  {result.wrong.map((w, i) => (
                    <div key={i} className="bg-slate-900 rounded p-3 text-sm">
                      <p>{w.task.q}</p>
                      <p className="text-slate-400">Ваш ответ: {w.userAnswer || '—'}</p>
                      <p className="text-emerald-300">Правильный: {w.task.answer}</p>
                    </div>
                  ))}
                  <button onClick={retakeWrong} className="bg-amber-600 hover:bg-amber-500 rounded px-4 py-2">Пересдать ошибки</button>
                </div>
              ) : (
                <p className="text-emerald-300">Идеально! Можно перейти к следующему уроку.</p>
              )}
              <button onClick={finishLesson} className="bg-indigo-600 hover:bg-indigo-500 rounded px-4 py-2">Завершить урок</button>
            </section>
          </main>
        );
      }

      return (
        <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4">
          <section className="glass rounded-2xl p-5 space-y-4">
            <div className="flex justify-between text-sm text-slate-300">
              <span>{activeLesson.title}</span>
              <span>Задание {index + 1}/{attemptTasks.length}</span>
            </div>
            <h2 className="text-xl font-semibold">{currentTask.q}</h2>
            {currentTask.audio && <button onClick={() => speak(currentTask.audio)} className="bg-indigo-600 hover:bg-indigo-500 rounded px-3 py-2">🔊 Прослушать</button>}

            {currentTask.type === 'dragWord' ? (
              <div className="space-y-3">
                <div
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={moveToDrop}
                  className="min-h-16 rounded border border-dashed border-emerald-400 p-2 flex flex-wrap gap-2 bg-emerald-900/10"
                >
                  {dropZone.length === 0 ? <span className="text-slate-400">Перетащи буквы сюда</span> : null}
                  {dropZone.map((tile, idx) => (
                    <button key={`${tile}-${idx}`} onClick={() => moveBack(idx)} className="bg-emerald-800/60 rounded px-3 py-1">{tile}</button>
                  ))}
                </div>
                <div className="flex flex-wrap gap-2">
                  {poolTiles.map((tile, idx) => (
                    <div
                      key={`${tile}-pool-${idx}`}
                      draggable
                      onDragStart={(e) => onDragStart(e, tile)}
                      className="tile bg-slate-700 rounded px-3 py-1"
                    >
                      {tile}
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="grid gap-2">
                {currentTask.options.map((o) => (
                  <button
                    key={o}
                    onClick={() => setChoice(o)}
                    className={`text-left px-3 py-2 rounded border ${choice === o ? 'border-emerald-400 bg-emerald-900/20' : 'border-slate-600 bg-slate-900'}`}
                  >
                    {o}
                  </button>
                ))}
              </div>
            )}

            <button onClick={saveAnswerAndNext} className="bg-emerald-600 hover:bg-emerald-500 rounded px-4 py-2">Дальше</button>
            <p className="text-xs text-slate-400">Проверка и разбор ошибок будут показаны после завершения урока.</p>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
