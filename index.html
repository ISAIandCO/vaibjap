<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#101828" />
  <meta name="description" content="Nihongo Quest — PWA для изучения японского с пошаговым обучением." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <title>Nihongo Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --bg0:#050814;
      --bg1:#0b1220;
      --card:rgba(15,23,42,.78);
      --stroke:rgba(148,163,184,.18);
      --stroke2:rgba(99,102,241,.25);
      --txt:#e2e8f0;
      --muted:#94a3b8;
      --accent:#7c3aed;
      --accent2:#22c55e;
      --warn:#f59e0b;
    }

    body {
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(124,58,237,.25), transparent 55%),
        radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.18), transparent 55%),
        radial-gradient(900px 600px at 60% 90%, rgba(59,130,246,.16), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--txt);
      touch-action: manipulation;
      overflow-x: hidden;
    }

    .noise::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.15"/></svg>');
      mix-blend-mode: overlay;
      opacity:.35;
    }

    .glass {
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow:
        0 1px 0 rgba(255,255,255,.04) inset,
        0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }

    .glass-strong {
      background: rgba(2,6,23,.65);
      border: 1px solid rgba(99,102,241,.22);
      box-shadow:
        0 1px 0 rgba(255,255,255,.04) inset,
        0 22px 70px rgba(0,0,0,.42);
      backdrop-filter: blur(12px);
    }

    .ring-accent { box-shadow: 0 0 0 1px var(--stroke2) inset; }
    .tile { cursor: pointer; user-select: none; }
    .soft { transition: transform .15s ease, border-color .15s ease, background .15s ease, opacity .15s ease; }
    .soft:hover { transform: translateY(-1px); }

    .gradient-btn {
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.85));
    }
    .gradient-btn2 {
      background: linear-gradient(135deg, rgba(34,197,94,.95), rgba(16,185,129,.8));
    }
    .gradient-warn {
      background: linear-gradient(135deg, rgba(245,158,11,.95), rgba(249,115,22,.85));
    }

    .tab-active{
      background: rgba(99,102,241,.12);
      border-color: rgba(99,102,241,.55);
    }

    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: .75rem;
      padding: .1rem .35rem;
      border-radius: .5rem;
      border: 1px solid rgba(148,163,184,.25);
      background: rgba(2,6,23,.5);
      color: rgba(226,232,240,.9);
    }

    @media (prefers-reduced-motion: reduce){
      .soft:hover { transform:none; }
    }
  </style>
</head>
<body class="min-h-screen noise">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    // --- Data -----------------------------------------------------------------
    // Базовый банк хираганы (в режиме "Кана" также используется таблица с группами)
    const kanaBank = [
      ['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],
      ['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],
      ['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],
      ['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],
      ['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],
      ['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],
      ['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],
      ['や','ya'],['ゆ','yu'],['よ','yo'],
      ['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro'],
      ['わ','wa'],['を','wo'],['ん','n']
    ];

    const kataMap = {
      'あ':'ア','い':'イ','う':'ウ','え':'エ','お':'オ',
      'か':'カ','き':'キ','く':'ク','け':'ケ','こ':'コ',
      'さ':'サ','し':'シ','す':'ス','せ':'セ','そ':'ソ',
      'た':'タ','ち':'チ','つ':'ツ','て':'テ','と':'ト',
      'な':'ナ','に':'ニ','ぬ':'ヌ','ね':'ネ','の':'ノ',
      'は':'ハ','ひ':'ヒ','ふ':'フ','へ':'ヘ','ほ':'ホ',
      'ま':'マ','み':'ミ','む':'ム','め':'メ','も':'モ',
      'や':'ヤ','ゆ':'ユ','よ':'ヨ',
      'ら':'ラ','り':'リ','る':'ル','れ':'レ','ろ':'ロ',
      'わ':'ワ','を':'ヲ','ん':'ン'
    };

    const gojuon = [
      { row:'A', cells:[['あ','a'],['い','i'],['う','u'],['え','e'],['お','o']] },
      { row:'K', cells:[['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko']] },
      { row:'S', cells:[['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so']] },
      { row:'T', cells:[['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to']] },
      { row:'N', cells:[['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no']] },
      { row:'H', cells:[['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']] },
      { row:'M', cells:[['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo']] },
      { row:'Y', cells:[['や','ya'],['',''],['ゆ','yu'],['',''],['よ','yo']] },
      { row:'R', cells:[['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro']] },
      { row:'W', cells:[['わ','wa'],['',''],['',''],['',''],['を','wo']] },
      { row:'N', cells:[['ん','n'],['',''],['',''],['',''],['','']] }
    ];

    const baseVocab = [
      { jp:'わたし', tr:'я' }, { jp:'あなた', tr:'ты/вы' }, { jp:'がくせい', tr:'студент' }, { jp:'せんせい', tr:'учитель' },
      { jp:'みず', tr:'вода' }, { jp:'ごはん', tr:'рис/еда' }, { jp:'ほん', tr:'книга' }, { jp:'ともだち', tr:'друг' },
      { jp:'きょう', tr:'сегодня' }, { jp:'あした', tr:'завтра' }, { jp:'いぬ', tr:'собака' }, { jp:'ねこ', tr:'кошка' },
      { jp:'えき', tr:'станция' }, { jp:'がっこう', tr:'школа' }, { jp:'しごと', tr:'работа' }, { jp:'にほん', tr:'Япония' }
    ];

    const phraseBank = [
      { jp:'おはようございます', tr:'доброе утро' },
      { jp:'こんにちは', tr:'добрый день' },
      { jp:'こんばんは', tr:'добрый вечер' },
      { jp:'ありがとうございます', tr:'спасибо' },
      { jp:'すみません', tr:'извините' },
      { jp:'はじめまして', tr:'приятно познакомиться' },
      { jp:'またあした', tr:'увидимся завтра' }
    ];

    const grammarBank = [
      { rule: 'は — частица темы.', sentence: 'わたしは がくせいです。', explain: 'Сначала тема, затем информация о теме.' },
      { rule: 'です — вежливая связка.', sentence: 'これは ほんです。', explain: 'Ставится в конце нейтрального утверждения.' },
      { rule: 'か — вопросительная частица.', sentence: 'これは みずですか。', explain: 'Добавляет вопрос в конце предложения.' },
      { rule: 'を — прямое дополнение.', sentence: 'ごはんを たべます。', explain: 'Показывает объект действия.' },
      { rule: 'に — направление/время.', sentence: 'えきに いきます。', explain: 'Отмечает направление или время.' },
      { rule: 'で — место действия.', sentence: 'がっこうで べんきょうします。', explain: 'Показывает место, где происходит действие.' }
    ];

    const distractRu = ['вчера','машина','снег','море','суп','лес','река'];

    // --- Helpers --------------------------------------------------------------
    const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
    const pick = (arr, i) => arr[(Math.abs(i) || 0) % arr.length];
    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
    const uniqBy = (arr, keyFn) => {
      const out = []; const seen = new Set();
      for (const x of arr) {
        const k = keyFn(x);
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(x);
      }
      return out;
    };
    const mixed = (correct, wrong) => shuffle([correct, ...wrong].slice(0, 4));
    const isoDate = (d = new Date()) => new Date(d).toISOString().slice(0, 10);
    const ts = (d = new Date()) => +new Date(d);
    const fmtShort = (iso) => {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit' });
      } catch { return iso; }
    }

    const teachWordTask = (w) => ({ type: 'teachWord', q: `Новое слово: ${w.jp} — ${w.tr}`, audio: w.jp, answer: w.jp, payload: w });
    const teachGrammarTask = (g) => ({ type: 'teachGrammar', q: `Грамматика: ${g.rule}`, audio: g.sentence, answer: g.rule, payload: g });
    const audioSpellTask = (word, tr, opts) => ({ type: 'audioSpell', q: `Прослушай и выбери написание слова («${tr}»)`, audio: word, options: mixed(word, opts), answer: word });

    function dragWordTask(word, tr, i) {
      const chars = word.split('');
      const extras = kanaBank.map((x) => x[0]).slice(i % 10, (i % 10) + 6);
      return {
        type: 'dragWord',
        q: `Собери слово (${tr})`,
        audio: word,
        answer: word,
        tiles: [...chars, ...extras].sort(() => Math.random() - 0.5)
      };
    }

    function pickWordWithKana(vocab, kanaList, idx) {
      return vocab.find((v) => kanaList.some((k) => v.jp.includes(k))) || pick(vocab, idx);
    }

    function makeMainLesson(day, vocab) {
      const k1 = pick(kanaBank, day - 1), k2 = pick(kanaBank, day + 3), k3 = pick(kanaBank, day + 8);
      const word1 = pickWordWithKana(vocab, [k1[0], k2[0], k3[0]], day);
      const word2 = pickWordWithKana(vocab, [k2[0], k3[0]], day + 4);
      const phrase = pick(phraseBank, day);
      const gram1 = pick(grammarBank, day);
      const gram2 = pick(grammarBank, day + 2);

      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: ${word1.jp}`,
        isReview: false,
        durationMin: 8,
        tasks: [
          { type: 'kana', q: `Новая буква: как читается ${k1[0]}?`, audio: k1[0], options: mixed(k1[1], ['to','na','mu']), answer: k1[1] },
          { type: 'kana', q: `Новая буква: как читается ${k2[0]}?`, audio: k2[0], options: mixed(k2[1], ['ra','yo','ne']), answer: k2[1] },
          teachWordTask(word1),
          { type: 'phrase', q: `Фраза дня: ${phrase.jp}`, audio: phrase.jp, options: mixed(phrase.tr, ['до встречи','приятного дня','доброй ночи']), answer: phrase.tr },
          { type: 'kanaPick', q: `Выбери символ для ${k3[1]}`, audio: k3[0], options: mixed(k3[0], ['め','ぬ','れ']), answer: k3[0] },
          audioSpellTask(word1.jp, word1.tr, [pick(vocab, day + 1).jp, pick(vocab, day + 2).jp, pick(vocab, day + 3).jp]),
          teachGrammarTask(gram1),
          { type: 'grammar', q: `Вопрос по грамматике`, audio: gram1.sentence, explain: gram1.explain, options: mixed(`${gram1.rule} ${gram1.explain}`, ['Глагол всегда в начале','Частицы не важны','です = прошедшее время']), answer: `${gram1.rule} ${gram1.explain}` },
          teachWordTask(word2),
          dragWordTask(word2.jp, word2.tr, day + 1),
          audioSpellTask(word2.jp, word2.tr, [pick(vocab, day + 5).jp, pick(vocab, day + 6).jp, pick(vocab, day + 7).jp]),
          { type: 'translate', q: `Теперь перевод: ${word1.jp}`, audio: word1.jp, options: mixed(word1.tr, distractRu.slice(day % 4, day % 4 + 3)), answer: word1.tr },
          teachGrammarTask(gram2),
          { type: 'grammar', q: `Ещё вопрос по грамматике`, audio: gram2.sentence, explain: gram2.explain, options: mixed(`${gram2.rule} ${gram2.explain}`, ['Не нужна вежливость','Частица стоит где угодно','Порядок слов всегда как в английском']), answer: `${gram2.rule} ${gram2.explain}` },
          { type: 'translate', q: `Теперь перевод: ${word2.jp}`, audio: word2.jp, options: mixed(word2.tr, distractRu.slice((day + 2) % 4, ((day + 2) % 4) + 3)), answer: word2.tr },
          { type: 'sentence', q: `Выбери правильное предложение (слова были изучены): わたし / がくせい`, audio: 'わたしは がくせいです', options: mixed('わたしは がくせいです', ['わたし がくせい は', 'です わたし がくせい', 'がくせい か わたし']), answer: 'わたしは がくせいです' },
          dragWordTask(word1.jp, word1.tr, day + 5)
        ]
      };
    }

    function makeReviewLesson(day, vocab) {
      const w1 = pick(vocab, day * 2), w2 = pick(vocab, day * 2 + 1), g = pick(grammarBank, day + 1);
      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: Повторение`,
        isReview: true,
        durationMin: 8,
        tasks: [
          teachWordTask(w1),
          audioSpellTask(w1.jp, w1.tr, [pick(vocab, day+1).jp, pick(vocab, day+2).jp, pick(vocab, day+3).jp]),
          { type: 'translate', q: `Повторение перевода: ${w1.jp}`, audio: w1.jp, options: mixed(w1.tr, ['город','море','ночь']), answer: w1.tr },
          teachGrammarTask(g),
          { type: 'grammar', q: 'Вопрос по грамматике', audio: g.sentence, explain: g.explain, options: mixed(`${g.rule} ${g.explain}`, ['Грамматика необязательна','Частицы не нужны','Сказуемое в начале']), answer: `${g.rule} ${g.explain}` },
          teachWordTask(w2),
          dragWordTask(w2.jp, w2.tr, day+9),
          { type: 'translate', q: `Повторение перевода: ${w2.jp}`, audio: w2.jp, options: mixed(w2.tr, ['река','гора','дверь']), answer: w2.tr }
        ]
      }
    }

    function makeLessons(vocab) {
      const list = [];
      for (let d = 1; d <= 42; d++) list.push(d % 7 === 0 ? makeReviewLesson(d, vocab) : makeMainLesson(d, vocab));
      return list;
    }

    // --- SRS (простая SM-2) ---------------------------------------------------
    // Хранится как map: jp -> card
    // card: { jp, tr, ef, interval, reps, due, lapses, addedAt, lastReviewed, lastGrade }
    function newCard(w) {
      return {
        jp: w.jp,
        tr: w.tr,
        ef: 2.5,
        interval: 0,
        reps: 0,
        due: ts(),
        lapses: 0,
        addedAt: ts(),
        lastReviewed: 0,
        lastGrade: null
      };
    }

    function sm2(card, grade) {
      // grade: 0..5
      let ef = card.ef;
      let reps = card.reps;
      let interval = card.interval;
      let lapses = card.lapses;

      if (grade < 3) {
        reps = 0;
        interval = 1;
        lapses += 1;
      } else {
        reps += 1;
        if (reps === 1) interval = 1;
        else if (reps === 2) interval = 6;
        else interval = Math.round(interval * ef);
      }

      // SM-2 EF update
      ef = ef + (0.1 - (5 - grade) * (0.08 + (5 - grade) * 0.02));
      ef = clamp(ef, 1.3, 2.8);

      // due in ms
      const due = ts() + interval * 24 * 60 * 60 * 1000;
      return {
        ...card,
        ef,
        reps,
        interval,
        lapses,
        due,
        lastReviewed: ts(),
        lastGrade: grade
      };
    }

    function App() {
      const [view, setView] = useState(() => localStorage.getItem('nq_view') || 'learn');
      const [vocab, setVocab] = useState(baseVocab);
      const [freqStatus, setFreqStatus] = useState('Загружен базовый словарь');
      const [progress, setProgress] = useState(() => JSON.parse(localStorage.getItem('nq_progress') || '{}'));
      const [stats, setStats] = useState(() => JSON.parse(localStorage.getItem('nq_stats') || '{"xp":0,"streak":0,"lastDate":""}'));
      const [goal, setGoal] = useState(() => JSON.parse(localStorage.getItem('nq_goal') || '{"dailyMinutes":10,"dailyReviews":20}'));
      const [activeId, setActiveId] = useState(null);
      const [attemptTasks, setAttemptTasks] = useState([]);
      const [index, setIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [choice, setChoice] = useState('');
      const [dropZone, setDropZone] = useState([]);
      const [poolTiles, setPoolTiles] = useState([]);
      const [result, setResult] = useState(null);
      const [swWaiting, setSwWaiting] = useState(false);
      const [speakHint, setSpeakHint] = useState('');
      const [toast, setToast] = useState(null);
      const [srs, setSrs] = useState(() => JSON.parse(localStorage.getItem('nq_srs') || '{}'));
      const [kanaMode, setKanaMode] = useState(() => JSON.parse(localStorage.getItem('nq_kanaMode') || '{"script":"hira","quiz":"kana2roma"}'));
      const [kanaQuiz, setKanaQuiz] = useState(null);
      const [vocabQuery, setVocabQuery] = useState('');
      const [customJp, setCustomJp] = useState('');
      const [customTr, setCustomTr] = useState('');
      const [reviewSession, setReviewSession] = useState(null); // { queue:[jp], idx, choices, correct }
      const [reviewChoice, setReviewChoice] = useState('');
      const lastSpokenRef = useRef({ text: '', time: 0 });

      useEffect(() => {
        localStorage.setItem('nq_progress', JSON.stringify(progress));
        localStorage.setItem('nq_stats', JSON.stringify(stats));
        localStorage.setItem('nq_srs', JSON.stringify(srs));
        localStorage.setItem('nq_goal', JSON.stringify(goal));
        localStorage.setItem('nq_kanaMode', JSON.stringify(kanaMode));
        localStorage.setItem('nq_view', view);
      }, [progress, stats]);

      useEffect(() => {
        localStorage.setItem('nq_srs', JSON.stringify(srs));
      }, [srs]);

      useEffect(() => {
        localStorage.setItem('nq_goal', JSON.stringify(goal));
      }, [goal]);

      useEffect(() => {
        localStorage.setItem('nq_kanaMode', JSON.stringify(kanaMode));
      }, [kanaMode]);

      useEffect(() => {
        localStorage.setItem('nq_view', view);
      }, [view]);

      useEffect(() => {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('./sw.js').then((reg) => {
          // If there is already a waiting SW, show update UI
          if (reg.waiting) setSwWaiting(true);

          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                setSwWaiting(true);
              }
            });
          });
        }).catch(() => {});
      }, []);

      useEffect(() => {
        if (!('serviceWorker' in navigator)) return;
        const onControllerChange = () => window.location.reload();
        navigator.serviceWorker.addEventListener('controllerchange', onControllerChange);
        return () => navigator.serviceWorker.removeEventListener('controllerchange', onControllerChange);
      }, []);

      const applyUpdate = () => {
        if (!('serviceWorker' in navigator)) return window.location.reload();
        navigator.serviceWorker.getRegistration().then((reg) => {
          if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          else window.location.reload();
        });
      };
      useEffect(() => {
        (async () => {
          try {
            setFreqStatus('Загрузка слов из основного wikiwords.lst...');
            const primaryUrl = 'https://raw.githubusercontent.com/ISAIandCO/vaibjap/refs/heads/main/wikiwords.lst';
            let text = '';
            try {
              const rPrimary = await fetch(primaryUrl);
              if (!rPrimary.ok) throw new Error('primary unavailable');
              text = await rPrimary.text();
            } catch {
              const rLocal = await fetch('./wikiwords.lst');
              if (!rLocal.ok) throw new Error('wikiwords.lst unavailable');
              text = await rLocal.text();
            }

            const fromList = [];
            const lines = text.split('\n');
            for (const raw of lines) {
              const line = raw.trim();
              if (!line || line.startsWith('#')) continue;
              
              const parts = line.split(/\t|\s+-\s+|\s+—\s+/).map((x) => x.trim()).filter(Boolean);
              if (!parts.length) continue;
              
              const jpRaw = parts[0].split(/[、,]/)[0].trim();
              const tr = parts.slice(1).join(' — ') || 'слово из списка';
              
              if (jpRaw) fromList.push({ jp: jpRaw, tr });
            }

            const baseMap = Object.fromEntries(baseVocab.map((v) => [v.jp, v.tr]));
            const uniq = [];
            const seen = new Set();
            for (const item of [...fromList, ...baseVocab]) {
              const jp = item.jp;
              if (!jp || seen.has(jp)) continue;
              seen.add(jp);
              uniq.push({ jp, tr: baseMap[jp] || item.tr || 'слово из списка' });
            }
            if (!uniq.length) throw new Error('wikiwords list parse failed');
            setVocab(uniq);
            setFreqStatus(`Подключен список wikiwords: ${uniq.length} слов`);
          } catch {
            setFreqStatus('Не удалось загрузить wikiwords.lst, используется локальный словарь');
          }
        })();
      }, []);

      const lessons = useMemo(() => makeLessons(vocab), [vocab]);
      const completed = Object.keys(progress).map(Number);
      const unlockedUpTo = Math.min(42, (completed.length ? Math.max(...completed) : 0) + 1);
      const activeLesson = useMemo(() => lessons.find((l) => l.id === activeId), [lessons, activeId]);
      const currentTask = attemptTasks[index];

      const dueCards = useMemo(() => {
        const now = ts();
        return Object.values(srs).filter((c) => (c?.due || 0) <= now).sort((a,b) => (a.due||0) - (b.due||0));
      }, [srs]);

      const masteredCount = useMemo(() => Object.values(srs).filter((c) => (c.reps || 0) >= 5 && (c.lapses || 0) === 0).length, [srs]);

      const todayIso = isoDate();
      const dailyProgress = useMemo(() => {
        // Очень простой трекер: если были ревью сегодня — считаем их. Логи не храним, поэтому приблизительно.
        // Можно улучшить позже, но для статического сайта достаточно.
        const reviewedToday = Object.values(srs).filter((c) => c.lastReviewed && isoDate(c.lastReviewed) === todayIso).length;
        return {
          lessonsDone: completed.filter((d) => d && progress[d] && progress[d] === true).length,
          reviewedToday,
        };
      }, [srs, todayIso, completed, progress]);

      useEffect(() => {
        if (!currentTask) return;
        setChoice('');
        setSpeakHint('');
        if (currentTask.type === 'dragWord') {
          setDropZone([]);
          setPoolTiles(currentTask.tiles);
        }

        // Автодобавление слова в SRS при изучении
        if (currentTask.type === 'teachWord' && currentTask.payload?.jp) {
          const w = currentTask.payload;
          setSrs((m) => m[w.jp] ? m : ({ ...m, [w.jp]: newCard(w) }));
        }
      }, [index, currentTask]);

      const speak = (text) => {
        if (!window.speechSynthesis || !text) return;
        const now = Date.now();
        const slow = lastSpokenRef.current.text === text && now - lastSpokenRef.current.time < 2500;
        lastSpokenRef.current = { text, time: now };
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        u.rate = slow ? 0.7 : 1;
        setSpeakHint(slow ? 'Замедленное воспроизведение' : 'Обычное воспроизведение');
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      };

      const toastMsg = (msg) => {
        setToast(msg);
        window.clearTimeout(toastMsg._t);
        toastMsg._t = window.setTimeout(() => setToast(null), 2200);
      };

      const startLesson = (lesson) => {
        if (lesson.id > unlockedUpTo) return;
        setActiveId(lesson.id);
        setAttemptTasks(lesson.tasks);
        setIndex(0);
        setAnswers([]);
        setResult(null);
        setView('learn');
      };

      const saveAnswerAndNext = () => {
        if (!currentTask) return;
        const isTeach = currentTask.type === 'teachWord' || currentTask.type === 'teachGrammar';
        const needsAnswer = !isTeach;
        const isReady = !needsAnswer || (currentTask.type === 'dragWord' ? (dropZone.join('').length === (currentTask.answer || '').length) : (choice && choice.length));
        if (!isReady) return;
        const userAnswer = isTeach ? '__learned__' : (currentTask.type === 'dragWord' ? dropZone.join('') : choice);
        const next = [...answers, { task: currentTask, userAnswer }];
        setAnswers(next);

        if (index + 1 < attemptTasks.length) return setIndex((i) => i + 1);

        const wrong = next.filter((x) => !['teachWord','teachGrammar'].includes(x.task.type) && x.userAnswer !== x.task.answer);
        const total = next.filter((x) => !['teachWord','teachGrammar'].includes(x.task.type)).length;
        setResult({ score: total - wrong.length, total, wrong });
      };

      const finishLesson = () => {
        const today = new Date().toISOString().slice(0,10);
        const gain = 20 + Math.round((result.score / Math.max(1, result.total)) * 40);
        setProgress((p) => ({ ...p, [activeId]: true }));
        setStats((s) => ({ xp: s.xp + gain, streak: s.lastDate === today ? s.streak : s.streak + 1, lastDate: today }));
        setActiveId(null); setAttemptTasks([]); setResult(null);
        toastMsg(`+${gain} XP`);
      };

      const moveTileToDropZone = (tile, idx) => {
        if (poolTiles[idx] !== tile) return;
        const np = [...poolTiles]; 
        np.splice(idx, 1);
        setPoolTiles(np); 
        setDropZone((d) => [...d, tile]);
        speak(tile);
      };

      const moveTileToPool = (tile, idx) => {
        const n = [...dropZone]; 
        n.splice(idx, 1);
        setDropZone(n); 
        setPoolTiles((p) => [...p, tile]); 
        speak(tile);
      };

      const retakeWrong = () => {
        setAttemptTasks(result.wrong.map((x) => x.task));
        setIndex(0); setAnswers([]); setResult(null);
      };

      // --- Review (SRS) -------------------------------------------------------
      const startReview = (count = goal.dailyReviews || 20) => {
        const due = dueCards.slice(0, clamp(count, 5, 60));
        if (!due.length) {
          toastMsg('На сегодня всё повторено');
          return;
        }
        const queue = due.map((c) => c.jp);
        setReviewSession({ queue, idx: 0, correct: 0, total: queue.length });
        setReviewChoice('');
        setView('review');
      };

      const currentReviewCard = useMemo(() => {
        if (!reviewSession) return null;
        const jp = reviewSession.queue[reviewSession.idx];
        return jp ? srs[jp] : null;
      }, [reviewSession, srs]);

      const reviewOptions = useMemo(() => {
        if (!currentReviewCard) return [];
        const correct = currentReviewCard.tr;
        const wrong = shuffle(vocab.filter((v) => v.tr && v.tr !== correct)).slice(0, 3).map((v) => v.tr);
        return mixed(correct, wrong);
      }, [currentReviewCard, vocab]);

      const gradeReview = (isCorrect) => {
        if (!currentReviewCard || !reviewSession) return;
        const grade = isCorrect ? 4 : 2; // Good vs Again
        setSrs((m) => ({ ...m, [currentReviewCard.jp]: sm2(m[currentReviewCard.jp], grade) }));

        const nextIdx = reviewSession.idx + 1;
        const nextCorrect = reviewSession.correct + (isCorrect ? 1 : 0);
        if (nextIdx >= reviewSession.queue.length) {
          // reward
          const gain = 5 * reviewSession.queue.length + (isCorrect ? 2 : 0);
          setStats((s) => ({ ...s, xp: s.xp + gain }));
          toastMsg(`Повторение завершено • +${gain} XP`);
          setReviewSession(null);
          setReviewChoice('');
          return;
        }
        setReviewSession({ ...reviewSession, idx: nextIdx, correct: nextCorrect });
        setReviewChoice('');
      };

      const addToDeck = (w) => {
        if (!w?.jp) return;
        setSrs((m) => m[w.jp] ? m : ({ ...m, [w.jp]: newCard(w) }));
        toastMsg(`Добавлено в колоду: ${w.jp}`);
      };

      const removeFromDeck = (jp) => {
        setSrs((m) => {
          const n = { ...m };
          delete n[jp];
          return n;
        });
        toastMsg('Удалено из колоды');
      };

      const startKanaQuiz = () => {
        const item = pick(kanaBank, Math.floor(Math.random() * 9999));
        const [hira, roma] = item;
        const script = kanaMode.script;
        const question = kanaMode.quiz === 'kana2roma'
          ? { prompt: script === 'hira' ? hira : (kataMap[hira] || hira), answer: roma, kind:'kana2roma' }
          : { prompt: roma, answer: script === 'hira' ? hira : (kataMap[hira] || hira), kind:'roma2kana' };

        const wrong = shuffle(kanaBank.filter((k) => k[1] !== roma)).slice(0, 3);
        const options = kanaMode.quiz === 'kana2roma'
          ? mixed(roma, wrong.map((x) => x[1]))
          : mixed(question.answer, wrong.map((x) => script === 'hira' ? x[0] : (kataMap[x[0]] || x[0])));
        setKanaQuiz({ ...question, options, picked: '' });
      };

      const submitKanaQuiz = () => {
        if (!kanaQuiz?.picked) return;
        const ok = kanaQuiz.picked === kanaQuiz.answer;
        setStats((s) => ({ ...s, xp: s.xp + (ok ? 3 : 0) }));
        toastMsg(ok ? '+3 XP' : 'Промах — попробуй ещё');
        startKanaQuiz();
      };

      const exportBackup = () => {
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          progress,
          stats,
          goal,
          srs,
          custom: vocab.filter((v) => v._custom)
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `nihongo-quest-backup-${isoDate()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      const importBackup = async (file) => {
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data || typeof data !== 'object') throw new Error('bad');
          if (data.progress) setProgress(data.progress);
          if (data.stats) setStats(data.stats);
          if (data.goal) setGoal(data.goal);
          if (data.srs) setSrs(data.srs);
          if (Array.isArray(data.custom) && data.custom.length) {
            setVocab((v) => uniqBy([...data.custom, ...v], (x) => x.jp));
          }
          toastMsg('Импорт выполнен');
        } catch {
          toastMsg('Не удалось импортировать');
        }
      };

      const resetAll = () => {
        if (!confirm('Сбросить прогресс, статистику и колоду?')) return;
        localStorage.removeItem('nq_progress');
        localStorage.removeItem('nq_stats');
        localStorage.removeItem('nq_srs');
        setProgress({});
        setStats({ xp:0, streak:0, lastDate:'' });
        setSrs({});
        setActiveId(null);
        setAttemptTasks([]);
        setResult(null);
        toastMsg('Сброшено');
      };

      // --- UI pieces ----------------------------------------------------------
      const Nav = () => {
        const tabs = [
          { id:'learn', label:'Уроки' },
          { id:'review', label:'Повторение', badge: dueCards.length ? dueCards.length : null },
          { id:'kana', label:'Кана' },
          { id:'vocab', label:'Словарь' },
          { id:'grammar', label:'Грамматика' },
          { id:'settings', label:'Настройки' },
        ];

        return (
          <header className="glass-strong rounded-3xl p-4 md:p-5 flex flex-col gap-4">
            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
              <div className="space-y-1">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-2xl gradient-btn grid place-items-center shadow-lg">
                    <span className="font-black">日</span>
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold tracking-tight">Nihongo Quest</h1>
                    <p className="text-slate-300 text-sm">{freqStatus}</p>
                  </div>
                </div>
                <div className="text-xs text-slate-400">
                  Совет: повторение — это сила. Для быстрого старта нажми <span className="kbd">Повторение</span>.
                </div>
              </div>

              <div className="grid grid-cols-4 gap-2 text-sm">
                <div className="glass rounded-2xl px-3 py-2 ring-accent">
                  XP<br/><b className="text-base">{stats.xp}</b>
                </div>
                <div className="glass rounded-2xl px-3 py-2">
                  Серия<br/><b className="text-base">{stats.streak}</b>
                </div>
                <div className="glass rounded-2xl px-3 py-2">
                  Уроки<br/><b className="text-base">{unlockedUpTo}/42</b>
                </div>
                <div className="glass rounded-2xl px-3 py-2">
                  В колоде<br/><b className="text-base">{Object.keys(srs).length}</b>
                </div>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {tabs.map((t) => (
                <button
                  key={t.id}
                  onClick={() => {
                    setActiveId(null);
                    setAttemptTasks([]);
                    setResult(null);
                    setView(t.id);
                    if (t.id === 'kana' && !kanaQuiz) startKanaQuiz();
                    if (t.id === 'review' && !reviewSession && dueCards.length) startReview();
                  }}
                  className={`soft px-3 py-2 rounded-2xl border text-sm ${view===t.id ? 'tab-active' : 'border-slate-700/70 bg-slate-950/40'} flex items-center gap-2`}
                >
                  <span>{t.label}</span>
                  {t.badge ? <span className="text-xs px-2 py-0.5 rounded-full bg-indigo-500/20 border border-indigo-400/40">{t.badge}</span> : null}
                </button>
              ))}
              <div className="flex-1" />
              <button onClick={() => startReview()} className="soft px-3 py-2 rounded-2xl gradient-btn2 text-sm font-semibold">Быстрое повторение</button>
            </div>
          </header>
        )
      };

      const Toast = () => {
        if (!toast) return null;
        return (
          <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-50">
            <div className="glass rounded-2xl px-4 py-2 text-sm border border-slate-700/60">{toast}</div>
          </div>
        );
      };

      const Shell = ({ children }) => (
        <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
          <Nav />
          {swWaiting && <div className="glass rounded-3xl p-4 flex items-center justify-between gap-3">
            <div className="text-sm"><b>Доступно обновление</b><div className="text-slate-300">Нажмите «Обновить», чтобы применить последнюю версию.</div></div>
            <button onClick={applyUpdate} className="soft gradient-btn2 rounded-2xl px-4 py-2 font-semibold">Обновить</button>
          </div>}
          {children}
          <Toast />
        </main>
      );

      if (result) {
        return (
          <Shell>
            <section className="max-w-3xl mx-auto glass rounded-3xl p-5 md:p-6 space-y-4">
              <div className="flex items-start justify-between gap-4">
                <div>
                  <h2 className="text-2xl font-bold">Результат урока</h2>
                  <p className="text-slate-300">{activeLesson?.title}</p>
                </div>
                <div className="glass rounded-2xl px-3 py-2 text-sm">
                  Верно<br/>
                  <b className="text-lg">{result.score}/{result.total}</b>
                </div>
              </div>

              {result.wrong.length > 0 && (
                <div className="space-y-2">
                  <p className="text-amber-300 font-semibold">Ошибки</p>
                  {result.wrong.map((w, i) => (
                    <div key={i} className="glass rounded-2xl p-3 text-sm space-y-1 border border-slate-700/70">
                      <p className="text-slate-200">{w.task.q}</p>
                      <p className="text-slate-400">Ваш ответ: <span className="text-slate-200">{w.userAnswer || '—'}</span></p>
                      <p className="text-emerald-300">Правильный: <span className="text-emerald-200">{w.task.answer}</span></p>
                      {w.task.explain && <p className="text-slate-300">Подсказка: {w.task.explain}</p>}
                    </div>
                  ))}
                  <button onClick={retakeWrong} className="soft gradient-warn rounded-2xl px-4 py-2 font-semibold">Пересдать ошибки</button>
                </div>
              )}

              <div className="flex flex-wrap gap-2">
                <button onClick={finishLesson} className="soft gradient-btn2 rounded-2xl px-4 py-2 font-semibold">Завершить урок</button>
                <button onClick={() => { setResult(null); setActiveId(null); setAttemptTasks([]); setView('review'); startReview(); }} className="soft px-4 py-2 rounded-2xl border border-slate-700/70 bg-slate-950/40">Перейти к повторению</button>
              </div>
            </section>
          </Shell>
        )
      }

      const isTeach = activeId && currentTask ? ['teachWord','teachGrammar'].includes(currentTask.type) : false;

      // --- Lesson running screen ---------------------------------------------
      if (activeId && currentTask) {
        return (
          <Shell>
            <section className="max-w-3xl mx-auto glass rounded-3xl p-5 md:p-6 space-y-4">
              <div className="flex flex-wrap justify-between items-center gap-2 text-sm text-slate-300">
                <span>{activeLesson?.title}</span>
                <span className="glass rounded-2xl px-3 py-1 border border-slate-700/60">Задание {index+1}/{attemptTasks.length}</span>
              </div>

              <h2 className="text-xl md:text-2xl font-semibold">{currentTask.q}</h2>

              <div className="flex flex-wrap items-center gap-2">
                <button onClick={() => speak(currentTask.audio || currentTask.answer)} className="soft gradient-btn rounded-2xl px-4 py-2 font-semibold">🔊 Прослушать</button>
                {currentTask.type === 'teachWord' && currentTask.payload?.jp && (
                  <button onClick={() => addToDeck(currentTask.payload)} className="soft px-4 py-2 rounded-2xl border border-slate-700/70 bg-slate-950/40">В колоду</button>
                )}
                {speakHint && <span className="text-xs text-indigo-300">{speakHint}</span>}
              </div>

              {isTeach ? (
                <div className="space-y-2 glass rounded-2xl p-4 border border-slate-700/70">
                  {currentTask.type === 'teachGrammar' && (
                    <>
                      <p><b>Правило:</b> {currentTask.payload.rule}</p>
                      <p><b>Пример:</b> <span className="text-slate-200">{currentTask.payload.sentence}</span></p>
                      <p className="text-slate-300"><b>Объяснение:</b> {currentTask.payload.explain}</p>
                    </>
                  )}
                  {currentTask.type === 'teachWord' && (
                    <>
                      <p className="text-slate-300">Запомни слово и перевод. Дальше будут задания на написание и перевод.</p>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="glass rounded-2xl p-3 border border-slate-700/60">
                          <div className="text-xs text-slate-400">Японский</div>
                          <div className="text-2xl font-bold">{currentTask.payload.jp}</div>
                        </div>
                        <div className="glass rounded-2xl p-3 border border-slate-700/60">
                          <div className="text-xs text-slate-400">Перевод</div>
                          <div className="text-lg font-semibold">{currentTask.payload.tr}</div>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              ) : currentTask.type === 'dragWord' ? (
                <div className="space-y-3">
                  <div className="min-h-16 rounded-2xl border border-dashed border-emerald-400/70 p-3 flex flex-wrap gap-2 bg-emerald-900/10">
                    {dropZone.length === 0 ? <span className="text-slate-400">Нажми на буквы ниже, чтобы собрать слово</span> : null}
                    {dropZone.map((t, idx) => (
                      <button key={`${t}-${idx}`} onClick={() => moveTileToPool(t, idx)} className="tile soft bg-emerald-800/60 rounded-2xl px-3 py-1">
                        {t}
                      </button>
                    ))}
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {poolTiles.map((t, idx) => (
                      <button key={`${t}-${idx}`} onClick={() => moveTileToDropZone(t, idx)} className="tile soft bg-slate-800/70 rounded-2xl px-3 py-1 border border-slate-700/60">
                        {t}
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="grid gap-2">
                  {currentTask.options.map((o) => (
                    <button
                      key={o}
                      onClick={() => setChoice(o)}
                      className={`soft text-left px-4 py-3 rounded-2xl border ${choice===o ? 'border-emerald-400/70 bg-emerald-900/20' : 'border-slate-700/70 bg-slate-950/40'}`}
                    >
                      {o}
                    </button>
                  ))}
                </div>
              )}

              <div className="flex flex-wrap gap-2">
                <button
                  onClick={saveAnswerAndNext}
                  disabled={!isTeach && (currentTask.type === 'dragWord' ? (dropZone.join('').length !== (currentTask.answer || '').length) : !choice)}
                  className={`soft rounded-2xl px-5 py-2 font-semibold ${(!isTeach && (currentTask.type === 'dragWord' ? (dropZone.join('').length !== (currentTask.answer || '').length) : !choice)) ? 'bg-slate-700/70 cursor-not-allowed' : 'gradient-btn2'}`}
                >
                  Дальше
                </button>
                <button onClick={() => { setActiveId(null); setAttemptTasks([]); setResult(null); }} className="soft rounded-2xl px-5 py-2 border border-slate-700/70 bg-slate-950/40">
                  Выйти
                </button>
              </div>
            </section>
          </Shell>
        )
      }

      // --- Views --------------------------------------------------------------
      const Achievements = () => {
        const badges = [
          { id:'streak3', title:'Серия 3', ok: stats.streak >= 3, desc:'3 дня подряд' },
          { id:'streak7', title:'Серия 7', ok: stats.streak >= 7, desc:'7 дней подряд' },
          { id:'xp500', title:'XP 500', ok: stats.xp >= 500, desc:'награда за регулярность' },
          { id:'lessons10', title:'10 уроков', ok: completed.length >= 10, desc:'первые шаги' },
          { id:'deck50', title:'Колодa 50', ok: Object.keys(srs).length >= 50, desc:'словарный запас растёт' },
          { id:'master', title:'Мастер', ok: masteredCount >= 20, desc:'20 слов без ошибок' },
        ];
        return (
          <div className="grid md:grid-cols-2 gap-3">
            {badges.map((b) => (
              <div key={b.id} className={`glass rounded-3xl p-4 border ${b.ok ? 'border-emerald-400/30' : 'border-slate-700/70'} flex items-start justify-between gap-3`}
              >
                <div>
                  <div className="font-semibold">{b.title}</div>
                  <div className="text-sm text-slate-300">{b.desc}</div>
                </div>
                <div className={`text-sm px-3 py-1 rounded-2xl border ${b.ok ? 'border-emerald-400/40 bg-emerald-900/10' : 'border-slate-700/70 bg-slate-950/40'}`}
                >
                  {b.ok ? '✅' : '⏳'}
                </div>
              </div>
            ))}
          </div>
        )
      };

      const LearnView = () => (
        <Shell>
          <section className="grid lg:grid-cols-3 gap-4">
            <div className="lg:col-span-2 space-y-3">
              <div className="glass rounded-3xl p-5 md:p-6 space-y-2">
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <div>
                    <div className="text-sm text-slate-300">План на сегодня</div>
                    <div className="text-2xl font-bold">{dueCards.length ? `Повторить ${Math.min(goal.dailyReviews, dueCards.length)} карточек` : 'Повторения нет'} • {goal.dailyMinutes} мин</div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => startReview()} className="soft gradient-btn2 rounded-2xl px-4 py-2 font-semibold">Старт повторения</button>
                    <button onClick={() => { setView('kana'); if (!kanaQuiz) startKanaQuiz(); }} className="soft rounded-2xl px-4 py-2 border border-slate-700/70 bg-slate-950/40">Кана-спринт</button>
                  </div>
                </div>
                <div className="text-sm text-slate-300">

              </div>

              <aside className="space-y-3">
                <div className="glass rounded-3xl p-5 md:p-6 space-y-2">
                  <h3 className="text-lg font-bold">Мини‑паттерны</h3>
                  <div className="text-sm text-slate-300 space-y-2">
                    <div className="glass rounded-2xl p-3 border border-slate-700/60">
                      <div className="text-xs text-slate-400">X は Y です</div>
                      <div className="font-semibold">Тема + утверждение</div>
                      <div className="text-slate-400 text-sm">わたしは がくせいです。</div>
                    </div>
                    <div className="glass rounded-2xl p-3 border border-slate-700/60">
                      <div className="text-xs text-slate-400">X を V ます</div>
                      <div className="font-semibold">Объект + действие</div>
                      <div className="text-slate-400 text-sm">ごはんを たべます。</div>
                    </div>
                    <div className="glass rounded-2xl p-3 border border-slate-700/60">
                      <div className="text-xs text-slate-400">X に いきます</div>
                      <div className="font-semibold">Направление</div>
                      <div className="text-slate-400 text-sm">えきに いきます。</div>
                    </div>
                  </div>
                </div>

                <div className="glass rounded-3xl p-5 md:p-6 space-y-2">
                  <h3 className="text-lg font-bold">Практика</h3>
                  <div className="text-sm text-slate-300">Старайся озвучивать примеры и повторять вслух.</div>
                  <button onClick={() => setView('learn')} className="soft rounded-2xl px-4 py-2 border border-slate-700/70 bg-slate-950/40">К урокам</button>
                </div>
              </aside>
            </section>
          </Shell>
        )
      };

      const SettingsView = () => (
        <Shell>
          <section className="max-w-3xl mx-auto space-y-3">
            <div className="glass rounded-3xl p-5 md:p-6">
              <h2 className="text-2xl font-bold">Настройки</h2>
              <p className="text-slate-300 text-sm">Цели + бэкап + сброс</p>

              <div className="mt-4 grid gap-3">
                <div className="glass rounded-3xl p-4 border border-slate-700/70">
                  <div className="font-semibold">Цель на день</div>
                  <div className="mt-2 grid md:grid-cols-2 gap-3">
                    <div>
                      <div className="text-sm text-slate-300">Повторений: <b className="text-slate-100">{goal.dailyReviews}</b></div>
                      <input type="range" min="10" max="60" step="5" value={goal.dailyReviews} onChange={(e) => setGoal((g) => ({ ...g, dailyReviews: +e.target.value }))} className="w-full" />
                    </div>
                    <div>
                      <div className="text-sm text-slate-300">Минут: <b className="text-slate-100">{goal.dailyMinutes}</b></div>
                      <input type="range" min="5" max="30" step="5" value={goal.dailyMinutes} onChange={(e) => setGoal((g) => ({ ...g, dailyMinutes: +e.target.value }))} className="w-full" />
                    </div>
                  </div>
                </div>

                <div className="glass rounded-3xl p-4 border border-slate-700/70 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                  <div>
                    <div className="font-semibold">Бэкап</div>
                    <div className="text-sm text-slate-300">Экспортируй и импортируй прогресс/колоду.</div>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    <button onClick={exportBackup} className="soft rounded-2xl px-4 py-2 border border-slate-700/70 bg-slate-950/40">Экспорт</button>
                    <label className="soft rounded-2xl px-4 py-2 border border-slate-700/70 bg-slate-950/40 cursor-pointer">
                      Импорт
                      <input type="file" accept="application/json" className="hidden" onChange={(e) => e.target.files?.[0] && importBackup(e.target.files[0])} />
                    </label>
                  </div>
                </div>

                <div className="glass rounded-3xl p-4 border border-slate-700/70 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                  <div>
                    <div className="font-semibold text-amber-200">Сброс</div>
                    <div className="text-sm text-slate-300">Удалит прогресс уроков, XP, серию и колоду.</div>
                  </div>
                  <button onClick={resetAll} className="soft gradient-warn rounded-2xl px-4 py-2 font-semibold">Сбросить всё</button>
                </div>
              </div>
            </div>

            <div className="glass rounded-3xl p-5 md:p-6 text-sm text-slate-300 space-y-2">
              <div className="font-semibold text-slate-100">О приватности</div>
              <div>Все данные хранятся локально в браузере (localStorage). На сервер ничего не отправляется.</div>
            </div>
          </section>
        </Shell>
      );

      // --- Route --------------------------------------------------------------
      if (view === 'review') return <ReviewView />;
      if (view === 'kana') return <KanaView />;
      if (view === 'vocab') return <VocabView />;
      if (view === 'grammar') return <GrammarView />;
      if (view === 'settings') return <SettingsView />;
      return <LearnView />;
    }

    window.addEventListener('error', () => {
      const root = document.getElementById('root');
      if (root && !root.innerHTML) root.innerHTML = '<div style="padding:16px;color:#fff">Ошибка загрузки приложения. Обновите страницу.</div>';
    });

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
