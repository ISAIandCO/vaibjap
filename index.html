<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#101828" />
  <meta name="description" content="Nihongo Quest — PWA-платформа для изучения японского языка с правильной педагогической последовательностью." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <title>Nihongo Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background:#0b1220; color:#e2e8f0; }
    .glass { background: rgba(15,23,42,.8); border:1px solid rgba(148,163,184,.2); }
    .tile { cursor: grab; user-select: none; touch-action: manipulation; }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState, useRef } = React;

    const kanaBank = [
      ['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],
      ['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],
      ['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho'],
      ['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo'],['や','ya'],['ゆ','yu'],['よ','yo'],['ら','ra'],['り','ri'],
      ['る','ru'],['れ','re'],['ろ','ro'],['わ','wa'],['を','wo'],['ん','n']
    ];

    const vocabBank = [
      { jp:'わたし', tr:'я' }, { jp:'あなた', tr:'ты/вы' }, { jp:'がくせい', tr:'студент' }, { jp:'せんせい', tr:'учитель' },
      { jp:'みず', tr:'вода' }, { jp:'ごはん', tr:'рис/еда' }, { jp:'ほん', tr:'книга' }, { jp:'ともだち', tr:'друг' },
      { jp:'きょう', tr:'сегодня' }, { jp:'あした', tr:'завтра' }, { jp:'いぬ', tr:'собака' }, { jp:'ねこ', tr:'кошка' },
      { jp:'えき', tr:'станция' }, { jp:'がっこう', tr:'школа' }, { jp:'しごと', tr:'работа' }, { jp:'にほん', tr:'Япония' },
      { jp:'かぞく', tr:'семья' }, { jp:'くるま', tr:'машина' }, { jp:'でんしゃ', tr:'поезд' }, { jp:'じてんしゃ', tr:'велосипед' },
      { jp:'えいが', tr:'фильм' }, { jp:'おんがく', tr:'музыка' }, { jp:'りょこう', tr:'путешествие' }, { jp:'じかん', tr:'время' },
      { jp:'いま', tr:'сейчас' }, { jp:'まいにち', tr:'каждый день' }, { jp:'あさ', tr:'утро' }, { jp:'よる', tr:'ночь' },
      { jp:'たべもの', tr:'еда' }, { jp:'のみもの', tr:'напиток' }, { jp:'りんご', tr:'яблоко' }, { jp:'さかな', tr:'рыба' },
      { jp:'にく', tr:'мясо' }, { jp:'やさい', tr:'овощи' }, { jp:'おちゃ', tr:'чай' }, { jp:'ぎんこう', tr:'банк' },
      { jp:'びょういん', tr:'больница' }, { jp:'こうえん', tr:'парк' }, { jp:'くに', tr:'страна' }, { jp:'まち', tr:'город' }
    ];

    const phraseBank = [
      { jp:'おはようございます', tr:'доброе утро' }, { jp:'こんにちは', tr:'добрый день' }, { jp:'こんばんは', tr:'добрый вечер' },
      { jp:'ありがとうございます', tr:'спасибо' }, { jp:'すみません', tr:'извините' }, { jp:'はじめまして', tr:'приятно познакомиться' },
      { jp:'よろしくおねがいします', tr:'прошу о сотрудничестве' }, { jp:'いただきます', tr:'приятного аппетита (перед едой)' },
      { jp:'ごちそうさまでした', tr:'спасибо за еду' }, { jp:'わかりません', tr:'я не понимаю' }, { jp:'だいじょうぶです', tr:'всё в порядке' },
      { jp:'またあした', tr:'увидимся завтра' }
    ];

    const grammarBits = [
      'は — частица темы. Ставится после темы: わたしは がくせいです。',
      'です — вежливая связка в конце нейтрального утверждения.',
      'か — вопросительная частица. Делает фразу вопросом.',
      'を — маркер прямого дополнения (что делаем?).',
      'に — направление/время: куда? когда?',
      'で — место действия: где происходит действие?',
      'と — союз "и" для перечисления существительных.',
      'の — принадлежность: чей/чья/чьё.',
      'も — тоже/также: добавляет сходство.'
    ];

    const distractorsRu = ['вчера', 'машина', 'снег', 'море', 'суп', 'лес', 'река', 'гора', 'окно', 'дверь'];
    const kanaDistractors = ['め', 'ぬ', 'を', 'れ', 'や', 'よ', 'む', 'の', 'ひ', 'ら'];

    const pick = (arr, i) => arr[i % arr.length];
    const mixedOptions = (correct, filler) => [correct, ...filler].slice(0, 4).sort(() => Math.random() - 0.5);

    const pickWordWithKana = (kanaChars, fallbackIndex) => {
      const found = vocabBank.find((v) => kanaChars.some((k) => v.jp.includes(k)));
      return found || pick(vocabBank, fallbackIndex);
    };

    const makeTeachWordTask = (word) => ({
      type: 'teach',
      q: `Запомни слово: ${word.jp} — ${word.tr}`,
      audio: word.jp,
      answer: word.jp
    });

    const makeTeachGrammarTask = (rule) => ({
      type: 'teach',
      q: `Объяснение грамматики: ${rule}`,
      audio: rule,
      answer: rule
    });

    const makeWordBuildTask = (word, translation, i) => {
      const chars = word.split('');
      const extras = kanaBank.map((x) => x[0]).slice(i % 12, (i % 12) + 8);
      const tiles = [...chars, ...extras.slice(0, Math.max(3, Math.ceil(chars.length / 2)))].sort(() => Math.random() - 0.5);
      return { type: 'dragWord', q: `Собери слово (${translation})`, answer: word, audio: word, tiles };
    };

    const makeAudioSpellingTask = (word, tr, alt1, alt2, alt3) => ({
      type: 'audioSpell',
      q: `Прослушай и выбери написание слова («${tr}»)`,
      audio: word,
      options: mixedOptions(word, [alt1, alt2, alt3]),
      answer: word
    });

    const makeMainLesson = (day) => {
      const k1 = pick(kanaBank, day - 1);
      const k2 = pick(kanaBank, day + 3);
      const k3 = pick(kanaBank, day + 8);
      const studiedKana = [k1[0], k2[0], k3[0]];

      const targetWord = pickWordWithKana(studiedKana, day);
      const secondWord = pickWordWithKana([k2[0], k3[0]], day + 11);
      const phrase1 = pick(phraseBank, day);
      const phrase2 = pick(phraseBank, day + 4);
      const grammar = pick(grammarBits, day);

      const distractWords = [pick(vocabBank, day + 1).jp, pick(vocabBank, day + 2).jp, pick(vocabBank, day + 5).jp];
      const distractWords2 = [pick(vocabBank, day + 6).jp, pick(vocabBank, day + 7).jp, pick(vocabBank, day + 9).jp];

      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: ${targetWord.jp} + ${k1[0]}${k2[0]}${k3[0]}`,
        isReview: false,
        durationMin: 8,
        tasks: [
          { type: 'kana', q: `Новая буква: как читается ${k1[0]}?`, audio: k1[0], options: mixedOptions(k1[1], ['to', 'na', 'mu']), answer: k1[1] },
          { type: 'kana', q: `Новая буква: как читается ${k2[0]}?`, audio: k2[0], options: mixedOptions(k2[1], ['ra', 'yo', 'ne']), answer: k2[1] },
          makeTeachWordTask(targetWord),
          { type: 'phrase', q: `Фраза дня: ${phrase1.jp}`, audio: phrase1.jp, options: mixedOptions(phrase1.tr, ['до встречи', 'я устал', 'приятного дня']), answer: phrase1.tr },
          { type: 'kanaPick', q: `Выбери символ для ${k3[1]}`, audio: k3[0], options: mixedOptions(k3[0], kanaDistractors.slice(day % 5, day % 5 + 3)), answer: k3[0] },
          makeAudioSpellingTask(targetWord.jp, targetWord.tr, distractWords[0], distractWords[1], distractWords[2]),
          makeTeachGrammarTask(grammar),
          { type: 'grammar', q: 'Теперь вопрос по правилу: выбери верное описание', audio: grammar, options: mixedOptions(grammar, ['Глагол всегда в начале', 'Частиц в японском нет', 'です = прошедшее время']), answer: grammar },
          makeTeachWordTask(secondWord),
          makeWordBuildTask(secondWord.jp, secondWord.tr, day + 1),
          makeAudioSpellingTask(secondWord.jp, secondWord.tr, distractWords2[0], distractWords2[1], distractWords2[2]),
          { type: 'translate', q: `Теперь перевод: ${targetWord.jp}`, audio: targetWord.jp, options: mixedOptions(targetWord.tr, distractorsRu.slice(day % 6, day % 6 + 3)), answer: targetWord.tr },
          { type: 'translate', q: `Теперь перевод: ${secondWord.jp}`, audio: secondWord.jp, options: mixedOptions(secondWord.tr, distractorsRu.slice((day + 2) % 6, ((day + 2) % 6) + 3)), answer: secondWord.tr },
          { type: 'sentence', q: 'Выбери правильное предложение (слова уже были в уроке): わたし / がくせい', audio: 'わたしは がくせいです', options: mixedOptions('わたしは がくせいです', ['わたし がくせい は', 'です わたし がくせい', 'がくせい か わたし']), answer: 'わたしは がくせいです' },
          { type: 'phrase', q: `Фраза дня: ${phrase2.jp}`, audio: phrase2.jp, options: mixedOptions(phrase2.tr, ['не понимаю', 'до завтра', 'доброй ночи']), answer: phrase2.tr },
          makeWordBuildTask(targetWord.jp, targetWord.tr, day + 7),
          { type: 'boss', q: 'Босс-раунд: Я завтра иду в школу', audio: 'わたしは あした がっこうに いきます', options: mixedOptions('わたしは あした がっこうに いきます', ['あしたは わたし いきます に がっこう', 'がっこうを あした です', 'わたし がっこう か']), answer: 'わたしは あした がっこうに いきます' }
        ]
      };
    };

    const makeReviewLesson = (day) => {
      const base = day * 2;
      const v1 = pick(vocabBank, base);
      const v2 = pick(vocabBank, base + 5);
      const p1 = pick(phraseBank, base + 2);
      const k1 = pick(kanaBank, base + 1);
      const g = pick(grammarBits, base + 3);

      return {
        id: day,
        unit: Math.ceil(day / 7),
        title: `День ${day}: Повторение юнита`,
        isReview: true,
        durationMin: 8,
        tasks: [
          { type: 'kana', q: `Повторение буквы: как читается ${k1[0]}?`, audio: k1[0], options: mixedOptions(k1[1], ['re', 'yo', 'wa']), answer: k1[1] },
          makeTeachWordTask(v1),
          makeAudioSpellingTask(v1.jp, v1.tr, pick(vocabBank, base + 1).jp, pick(vocabBank, base + 2).jp, pick(vocabBank, base + 3).jp),
          { type: 'translate', q: `Повторение перевода: ${v1.jp}`, audio: v1.jp, options: mixedOptions(v1.tr, ['город', 'море', 'ночь']), answer: v1.tr },
          makeTeachGrammarTask(g),
          { type: 'grammar', q: 'Вопрос по грамматике', audio: g, options: mixedOptions(g, ['Частицы не нужны', 'Глагол всегда первый', 'Вежливости не существует']), answer: g },
          makeTeachWordTask(v2),
          makeWordBuildTask(v2.jp, v2.tr, day + 10),
          makeAudioSpellingTask(v2.jp, v2.tr, pick(vocabBank, base + 4).jp, pick(vocabBank, base + 6).jp, pick(vocabBank, base + 7).jp),
          { type: 'translate', q: `Повторение перевода: ${v2.jp}`, audio: v2.jp, options: mixedOptions(v2.tr, ['река', 'гора', 'дверь']), answer: v2.tr },
          { type: 'phrase', q: `Повторение фразы: ${p1.jp}`, audio: p1.jp, options: mixedOptions(p1.tr, ['до завтра', 'я студент', 'приятного аппетита']), answer: p1.tr },
          { type: 'boss', q: 'Контроль: выбери корректное предложение', audio: 'わたしは がくせいです', options: mixedOptions('わたしは がくせいです', ['わたし がくせい は', 'です わたし がくせい', 'わたし か がくせい']), answer: 'わたしは がくせいです' }
        ]
      };
    };

    const makeLessons = () => {
      const lessons = [];
      for (let day = 1; day <= 42; day++) lessons.push(day % 7 === 0 ? makeReviewLesson(day) : makeMainLesson(day));
      return lessons;
    };

    const lessons = makeLessons();

    function App() {
      const [progress, setProgress] = useState(() => JSON.parse(localStorage.getItem('nq_progress') || '{}'));
      const [stats, setStats] = useState(() => JSON.parse(localStorage.getItem('nq_stats') || '{"xp":0,"streak":0,"lastDate":""}'));
      const [activeId, setActiveId] = useState(null);
      const [attemptTasks, setAttemptTasks] = useState([]);
      const [index, setIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [choice, setChoice] = useState('');
      const [dropZone, setDropZone] = useState([]);
      const [poolTiles, setPoolTiles] = useState([]);
      const [result, setResult] = useState(null);
      const [speakHint, setSpeakHint] = useState('');
      const lastSpokenRef = useRef({ text: '', time: 0, count: 0 });

      useEffect(() => {
        localStorage.setItem('nq_progress', JSON.stringify(progress));
        localStorage.setItem('nq_stats', JSON.stringify(stats));
      }, [progress, stats]);

      useEffect(() => {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
      }, []);

      const completedIds = Object.keys(progress).map(Number);
      const maxCompleted = completedIds.length ? Math.max(...completedIds) : 0;
      const unlockedUpTo = Math.min(42, maxCompleted + 1);
      const activeLesson = useMemo(() => lessons.find((l) => l.id === activeId), [activeId]);
      const currentTask = attemptTasks[index];

      useEffect(() => {
        if (!currentTask) return;
        setChoice('');
        setSpeakHint('');
        if (currentTask.type === 'dragWord') {
          setDropZone([]);
          setPoolTiles(currentTask.tiles);
        }
      }, [index, currentTask]);

      const speak = (text) => {
        if (!window.speechSynthesis || !text) return;
        const now = Date.now();
        const sameText = lastSpokenRef.current.text === text;
        const closeClick = now - lastSpokenRef.current.time < 2500;
        const shouldSlow = sameText && closeClick;

        lastSpokenRef.current = {
          text,
          time: now,
          count: shouldSlow ? lastSpokenRef.current.count + 1 : 1
        };

        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        u.rate = shouldSlow ? 0.7 : 1;
        setSpeakHint(shouldSlow ? 'Замедленное воспроизведение' : 'Обычное воспроизведение');
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      };
    };

      const startLesson = (lesson) => {
        if (lesson.id > unlockedUpTo) return;
        setActiveId(lesson.id);
        setAttemptTasks(lesson.tasks);
        setIndex(0);
        setAnswers([]);
        setResult(null);
      };

      const saveAnswerAndNext = () => {
        if (!currentTask) return;
        const isTeach = currentTask.type === 'teach';
        const userAnswer = isTeach ? '__learned__' : (currentTask.type === 'dragWord' ? dropZone.join('') : choice);
        setAnswers((prev) => [...prev, { task: currentTask, userAnswer }]);

        if (index + 1 < attemptTasks.length) {
          setIndex((i) => i + 1);
          return;
        }

        const finalAnswers = [...answers, { task: currentTask, userAnswer }];
        const wrong = finalAnswers.filter((x) => x.task.type !== 'teach' && x.userAnswer !== x.task.answer);
        const scoredTotal = finalAnswers.filter((x) => x.task.type !== 'teach').length;
        const score = scoredTotal - wrong.length;
        setResult({ score, total: scoredTotal, wrong, all: finalAnswers });
      };

      const finishLesson = () => {
        const today = new Date().toISOString().slice(0, 10);
        const gain = 20 + Math.round((result.score / Math.max(1, result.total)) * 40);
        setProgress((p) => ({ ...p, [activeId]: true }));
        setStats((s) => ({ xp: s.xp + gain, streak: s.lastDate === today ? s.streak : s.streak + 1, lastDate: today }));
        setActiveId(null);
        setAttemptTasks([]);
        setResult(null);
      };

      const retakeWrong = () => {
        const wrongTasks = result.wrong.map((x) => x.task);
        setAttemptTasks(wrongTasks);
        setIndex(0);
        setAnswers([]);
        setResult(null);
      };

      const onDragStart = (e, tile, idx) => e.dataTransfer.setData('text/plain', `${tile}::${idx}`);
      const moveTileFromPool = (payload) => {
        const [tile, idxStr] = payload.split('::');
        const idx = Number(idxStr);
        if (!Number.isInteger(idx) || poolTiles[idx] !== tile) return;
        const nextPool = [...poolTiles];
        nextPool.splice(idx, 1);
        setPoolTiles(nextPool);
        setDropZone((d) => [...d, tile]);
      };
      const moveToDrop = (e) => {
        e.preventDefault();
        moveTileFromPool(e.dataTransfer.getData('text/plain'));
      };
      const tapToDrop = (idx) => {
        const payload = `${poolTiles[idx]}::${idx}`;
        moveTileFromPool(payload);
      };
      const moveBack = (idx) => {
        const next = [...dropZone];
        const [tile] = next.splice(idx, 1);
        setDropZone(next);
        setPoolTiles((p) => [...p, tile]);
      };

      if (!activeId) {
        return (
          <main className="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
            <header className="glass rounded-2xl p-5 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
              <div>
                <h1 className="text-2xl font-bold">Nihongo Quest (PWA)</h1>
                <p className="text-slate-300">Сначала обучение буквам/словам/грамматике, затем проверка. Повторное нажатие 🔊 даёт замедленное воспроизведение.</p>
              </div>
              <div className="grid grid-cols-3 gap-3 text-sm">
                <div className="glass rounded-xl px-3 py-2">XP<br/><b>{stats.xp}</b></div>
                <div className="glass rounded-xl px-3 py-2">Серия<br/><b>{stats.streak}</b></div>
                <div className="glass rounded-xl px-3 py-2">Открыто<br/><b>{unlockedUpTo}/42</b></div>
              </div>
            </header>

            <section className="space-y-3">
              {lessons.map((lesson) => {
                const locked = lesson.id > unlockedUpTo;
                return (
                  <button
                    key={lesson.id}
                    disabled={locked}
                    onClick={() => startLesson(lesson)}
                    className={`w-full text-left glass rounded-xl p-4 transition ${locked ? 'opacity-40 cursor-not-allowed' : 'hover:border-indigo-400'}`}
                  >
                    <div className="flex items-center justify-between gap-3">
                      <div>
                        <p className="text-xs text-indigo-300">Юнит {lesson.unit} {lesson.isReview ? '• Повторение' : ''}</p>
                        <h2 className="font-semibold">{lesson.title}</h2>
                        <p className="text-sm text-slate-300">⏱ {lesson.durationMin} мин • {lesson.tasks.length} заданий</p>
                      </div>
                      <div className="text-right text-sm">
                        <p>{progress[lesson.id] ? '✅ Завершен' : locked ? '🔒 Закрыт' : '🟢 Доступен'}</p>
                      </div>
                    </div>
                  </button>
                );
              })}
            </section>
          </main>
        );
      }

      if (result) {
        return (
          <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4">
            <section className="glass rounded-2xl p-5 space-y-4">
              <h2 className="text-2xl font-bold">Результат урока</h2>
              <p>Верно: <b>{result.score}/{result.total}</b></p>
              {result.wrong.length > 0 ? (
                <div className="space-y-2">
                  <p className="text-amber-300">Ошибки (исправление только после урока):</p>
                  {result.wrong.map((w, i) => (
                    <div key={i} className="bg-slate-900 rounded p-3 text-sm">
                      <p>{w.task.q}</p>
                      <p className="text-slate-400">Ваш ответ: {w.userAnswer || '—'}</p>
                      <p className="text-emerald-300">Правильный: {w.task.answer}</p>
                    </div>
                  ))}
                  <button onClick={retakeWrong} className="bg-amber-600 hover:bg-amber-500 rounded px-4 py-2">Пересдать ошибки</button>
                </div>
              ) : <p className="text-emerald-300">Идеально! Можно перейти к следующему уроку.</p>}
              <button onClick={finishLesson} className="bg-indigo-600 hover:bg-indigo-500 rounded px-4 py-2">Завершить урок</button>
            </section>
          </main>
        );
      }

      const isTeach = currentTask.type === 'teach';
      return (
        <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4">
          <section className="glass rounded-2xl p-5 space-y-4">
            <div className="flex justify-between text-sm text-slate-300">
              <span>{activeLesson.title}</span>
              <span>Задание {index + 1}/{attemptTasks.length}</span>
            </div>
            <h2 className="text-xl font-semibold">{currentTask.q}</h2>
            <button onClick={() => speak(currentTask.audio || currentTask.answer)} className="bg-indigo-600 hover:bg-indigo-500 rounded px-3 py-2">🔊 Прослушать</button>
            {speakHint && <p className="text-xs text-indigo-300">{speakHint}</p>}

            {isTeach ? (
              <p className="text-slate-300 bg-slate-900 rounded p-3">Это обучающий шаг. Запомни материал и переходи дальше.</p>
            ) : currentTask.type === 'dragWord' ? (
              <div className="space-y-3">
                <div onDragOver={(e) => e.preventDefault()} onDrop={moveToDrop} className="min-h-16 rounded border border-dashed border-emerald-400 p-2 flex flex-wrap gap-2 bg-emerald-900/10">
                  {dropZone.length === 0 ? <span className="text-slate-400">Перетащи буквы сюда или нажми на букву ниже</span> : null}
                  {dropZone.map((tile, idx) => <button key={`${tile}-${idx}`} onClick={() => moveBack(idx)} className="bg-emerald-800/60 rounded px-3 py-1">{tile}</button>)}
                </div>
                <div className="flex flex-wrap gap-2">
                  {poolTiles.map((tile, idx) => (
                    <button
                      key={`${tile}-pool-${idx}`}
                      draggable
                      onDragStart={(e) => onDragStart(e, tile, idx)}
                      onClick={() => tapToDrop(idx)}
                      className="tile bg-slate-700 rounded px-3 py-1"
                    >
                      {tile}
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              <div className="grid gap-2">
                {currentTask.options.map((o) => (
                  <button key={o} onClick={() => setChoice(o)} className={`text-left px-3 py-2 rounded border ${choice === o ? 'border-emerald-400 bg-emerald-900/20' : 'border-slate-600 bg-slate-900'}`}>{o}</button>
                ))}
              </div>
            )}

            <button onClick={saveAnswerAndNext} className="bg-emerald-600 hover:bg-emerald-500 rounded px-4 py-2">Дальше</button>
            <p className="text-xs text-slate-400">Проверка и разбор ошибок будут показаны после завершения урока.</p>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
