<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#101828" />
  <meta name="description" content="Nihongo Quest — PWA-платформа для изучения японского в формате микро-уроков." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <title>Nihongo Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background:#0b1220; color:#e2e8f0; }
    .glass { background: rgba(15,23,42,.8); border:1px solid rgba(148,163,184,.2); }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const kanaBank = [
      ['あ','a'],['い','i'],['う','u'],['え','e'],['お','o'],['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko'],
      ['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so'],['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to'],
      ['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no'],['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']
    ];

    const vocabBank = [
      { jp:'わたし', tr:'я' }, { jp:'あなた', tr:'ты/вы' }, { jp:'がくせい', tr:'студент' }, { jp:'せんせい', tr:'учитель' },
      { jp:'みず', tr:'вода' }, { jp:'ごはん', tr:'рис/еда' }, { jp:'ほん', tr:'книга' }, { jp:'ともだち', tr:'друг' },
      { jp:'きょう', tr:'сегодня' }, { jp:'あした', tr:'завтра' }, { jp:'いぬ', tr:'собака' }, { jp:'ねこ', tr:'кошка' },
      { jp:'えき', tr:'станция' }, { jp:'がっこう', tr:'школа' }, { jp:'しごと', tr:'работа' }
    ];

    const grammarBits = [
      'は — частица темы: わたしは がくせいです。',
      'です — вежливая связка в конце фразы.',
      'か — вопросительная частица: ...ですか？',
      'を — маркер прямого дополнения.',
      'に — направление/время: えきに いきます。',
      'で — место действия: がっこうで べんきょうします。'
    ];

    const makeLessons = () => {
      const lessons = [];
      for (let day = 1; day <= 42; day++) {
        const kana = kanaBank[(day - 1) % kanaBank.length];
        const vocab = vocabBank[(day - 1) % vocabBank.length];
        const grammar = grammarBits[(day - 1) % grammarBits.length];
        lessons.push({
          id: day,
          unit: Math.ceil(day / 7),
          title: `День ${day}: ${vocab.jp} + ${kana[0]}`,
          description: `Минимум 5 минут: 12 упражнений, аудио, перевод, сборка фразы и адаптивный повтор.`,
          durationMin: 6,
          hearts: 5,
          tasks: [
            { type: 'kana', q: `Как читается ${kana[0]}?`, options: [kana[1], 'to', 'na', 'mu'], answer: kana[1] },
            { type: 'translate', q: `Переведи: ${vocab.jp}`, options: [vocab.tr, 'вчера', 'машина', 'снег'], answer: vocab.tr },
            { type: 'grammar', q: 'Выбери верное правило', options: [grammar, 'Глагол всегда в начале', 'Частиц в японском нет', 'です = прошедшее время'], answer: grammar },
            { type: 'build', q: 'Собери: Я студент', tokens: ['わたし', 'は', 'がくせい', 'です'], answer: 'わたし は がくせい です' },
            { type: 'audio', q: `Нажми прослушать и выбери перевод: ${vocab.jp}`, utterance: vocab.jp, options: [vocab.tr, 'суп', 'город', 'море'], answer: vocab.tr },
            { type: 'kana', q: `Выбери символ для ${kana[1]}`, options: [kana[0], 'め', 'ぬ', 'を'], answer: kana[0] },
            { type: 'translate', q: 'Переведи: ほん', options: ['книга', 'вода', 'школа', 'кошка'], answer: 'книга' },
            { type: 'build', q: 'Собери вопрос: Это книга?', tokens: ['ほん', 'です', 'か'], answer: 'ほん です か' },
            { type: 'grammar', q: 'Что делает частица か?', options: ['делает вопрос', 'делает отрицание', 'делает прошедшее', 'делает множественное'], answer: 'делает вопрос' },
            { type: 'audio', q: 'Прослушай и выбери: こんにちは', utterance: 'こんにちは', options: ['добрый день', 'спокойной ночи', 'спасибо', 'до встречи'], answer: 'добрый день' },
            { type: 'translate', q: 'Переведи: みず', options: ['вода', 'рис', 'хлеб', 'чай'], answer: 'вода' },
            { type: 'boss', q: 'Босс-раунд: Я завтра иду в школу', options: ['わたしは あした がっこうに いきます', 'あしたは わたし いきます に がっこう', 'がっこうを あした です', 'わたし がっこう か'], answer: 'わたしは あした がっこうに いきます' }
          ]
        });
      }
      return lessons;
    };

    const lessons = makeLessons();

    function App() {
      const [progress, setProgress] = useState(() => JSON.parse(localStorage.getItem('nq_progress') || '{}'));
      const [stats, setStats] = useState(() => JSON.parse(localStorage.getItem('nq_stats') || '{"xp":0,"streak":0,"lastDate":""}'));
      const [active, setActive] = useState(null);
      const [index, setIndex] = useState(0);
      const [hearts, setHearts] = useState(5);
      const [selected, setSelected] = useState('');
      const [typed, setTyped] = useState('');
      const [feedback, setFeedback] = useState('');

      useEffect(() => {
        localStorage.setItem('nq_progress', JSON.stringify(progress));
        localStorage.setItem('nq_stats', JSON.stringify(stats));
      }, [progress, stats]);

      useEffect(() => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
      }, []);

      const completedCount = Object.keys(progress).length;
      const today = new Date().toISOString().slice(0,10);
      const dailyGoal = 60;
      const quest = [
        { title: 'Ежедневная цель', done: stats.xp % dailyGoal, total: dailyGoal },
        { title: 'Уроки недели', done: completedCount % 7, total: 7 },
        { title: 'Без ошибок', done: Math.min(hearts,5), total: 5 }
      ];

      const currentTask = active ? lessons.find(l => l.id === active).tasks[index] : null;

      const speak = (text) => {
        if (!window.speechSynthesis) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        window.speechSynthesis.speak(u);
      };

      const check = () => {
        if (!currentTask) return;
        const answer = currentTask.type === 'build' ? typed.trim() : selected;
        const ok = answer === currentTask.answer;
        if (!ok) setHearts((h) => Math.max(h - 1, 0));
        setFeedback(ok ? '✅ Верно!' : `❌ Неверно. Правильный ответ: ${currentTask.answer}`);
      };

      const next = () => {
        setSelected('');
        setTyped('');
        setFeedback('');
        const lesson = lessons.find(l => l.id === active);
        if (index + 1 < lesson.tasks.length && hearts > 0) {
          setIndex(index + 1);
          return;
        }

        const gained = Math.max(15, hearts * 8 + 20);
        const newProgress = { ...progress, [active]: true };
        const newStreak = stats.lastDate === today ? stats.streak : stats.streak + 1;
        setProgress(newProgress);
        setStats({ xp: stats.xp + gained, streak: newStreak, lastDate: today });
        setActive(null);
        setIndex(0);
        setHearts(5);
      };

      if (!active) {
        return (
          <main className="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
            <header className="glass rounded-2xl p-5 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
              <div>
                <h1 className="text-2xl font-bold">Nihongo Quest (PWA)</h1>
                <p className="text-slate-300">42 урока (6 недель), каждый ~6 минут, формат как в языковых тренажёрах: XP, серия, квесты, босс-раунды.</p>
              </div>
              <div className="grid grid-cols-3 gap-3 text-sm">
                <div className="glass rounded-xl px-3 py-2">XP<br/><b>{stats.xp}</b></div>
                <div className="glass rounded-xl px-3 py-2">Серия<br/><b>{stats.streak}</b></div>
                <div className="glass rounded-xl px-3 py-2">Пройдено<br/><b>{completedCount}/{lessons.length}</b></div>
              </div>
            </header>

            <section className="grid md:grid-cols-3 gap-4">
              {quest.map((q) => (
                <article key={q.title} className="glass rounded-xl p-4">
                  <p className="font-semibold">{q.title}</p>
                  <div className="mt-2 h-2 bg-slate-700 rounded-full overflow-hidden">
                    <div className="h-full bg-emerald-400" style={{width:`${(q.done/q.total)*100}%`}} />
                  </div>
                  <p className="text-xs text-slate-300 mt-2">{q.done}/{q.total}</p>
                </article>
              ))}
            </section>

            <section className="space-y-3">
              {lessons.map((lesson) => (
                <button key={lesson.id} onClick={() => {setActive(lesson.id); setHearts(lesson.hearts);}} className="w-full text-left glass rounded-xl p-4 hover:border-indigo-400 transition">
                  <div className="flex items-center justify-between gap-3">
                    <div>
                      <p className="text-xs text-indigo-300">Юнит {lesson.unit}</p>
                      <h2 className="font-semibold">{lesson.title}</h2>
                      <p className="text-sm text-slate-300">{lesson.description}</p>
                    </div>
                    <div className="text-right text-sm">
                      <p>⏱ {lesson.durationMin} мин</p>
                      <p>{progress[lesson.id] ? '✅ Завершен' : '🟡 Не начат'}</p>
                    </div>
                  </div>
                </button>
              ))}
            </section>
          </main>
        );
      }

      return (
        <main className="max-w-3xl mx-auto p-4 md:p-8 space-y-4">
          <button onClick={() => { setActive(null); setIndex(0); setHearts(5); }} className="text-sm text-slate-300">← К карте курса</button>
          <section className="glass rounded-2xl p-5 space-y-4">
            <div className="flex justify-between text-sm text-slate-300">
              <span>Задание {index+1}/12</span><span>❤️ {hearts}</span>
            </div>
            <h2 className="text-xl font-semibold">{currentTask.q}</h2>

            {currentTask.type === 'build' && (
              <div className="space-y-3">
                <div className="flex flex-wrap gap-2">
                  {currentTask.tokens.map((t) => <button key={t} onClick={() => setTyped((v) => `${v} ${t}`.trim())} className="bg-slate-700 rounded px-3 py-2">{t}</button>)}
                </div>
                <input className="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2" value={typed} onChange={(e)=>setTyped(e.target.value)} placeholder="Собранный ответ" />
              </div>
            )}

            {(currentTask.type !== 'build') && (
              <div className="grid gap-2">
                {currentTask.options.map((o) => (
                  <button key={o} onClick={() => setSelected(o)} className={`text-left px-3 py-2 rounded border ${selected===o ? 'border-emerald-400 bg-emerald-900/20' : 'border-slate-600 bg-slate-900'}`}>{o}</button>
                ))}
              </div>
            )}

            {currentTask.type === 'audio' && (
              <button onClick={() => speak(currentTask.utterance)} className="bg-indigo-600 hover:bg-indigo-500 rounded px-3 py-2">🔊 Прослушать</button>
            )}

            <div className="flex gap-2">
              <button onClick={check} className="bg-emerald-600 hover:bg-emerald-500 rounded px-4 py-2">Проверить</button>
              <button onClick={next} className="bg-slate-700 hover:bg-slate-600 rounded px-4 py-2">Дальше</button>
            </div>
            {feedback && <p className="text-sm">{feedback}</p>}
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
